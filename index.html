<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Firebase Form</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .form-container { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0084ff; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: #0073e6; }
    </style>
</head>
<body>

<div class="form-container">
    <form id="contact-form">
        <input type="text" id="username" placeholder="Your Name" required>
        <input type="email" id="useremail" placeholder="Your Email" required>
        <button type="submit">Submit & Request</button>
    </form>
</div>

<script type="module">
    // Firebase Configuration
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, addDoc } from "https://gstatic.com";

    // (Add this to script)
    const firebaseConfig = {
        apiKey: "AIzaSyB1-P8v7I2qY9Q7vX5r4c3b2a1",
        authDomain: "://firebaseapp.com",
        projectId: "test-23c44",
        storageBucket: "://appspot.com",
        messagingSenderId: "1234567890",
        appId: "1:1234567890:web:1234567890abcdef"
    };

    // Initialize
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Prompt user
    document.getElementById("contact-form").addEventListener("submit", (e) => {
        e.preventDefault();

        const userName = document.getElementById("username").value;
        const userEmail = document.getElementById("useremail").value;

        try {
            addDoc(collection(db, "requests"), {
                name: userName,
                email: userEmail,
                timestamp: new Date()
            });
            alert("Request sent successfully!");
            document.getElementById("contact-form").reset();
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("Error: check console.");
        }
    });
</script>

</body>
</html>
