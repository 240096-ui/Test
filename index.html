<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger PRO | Ultra Edition</title>
    <style>
        :root {
            --bg-dark: #1e1f22;
            --bg-light: #2b2d31;
            --accent: #5865f2;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --white: #ffffff;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'gg sans', 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-dark); color: var(--text-main); 
            height: 100vh; display: flex; overflow: hidden; 
        }

        /* Окно входа */
        .login-screen {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-box {
            background: var(--bg-light); padding: 40px; border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); text-align: center; width: 400px;
        }
        .login-box h2 { margin: 0 0 10px; color: var(--white); }
        .login-box p { color: var(--text-muted); margin-bottom: 25px; }

        .btn-google {
            background: var(--accent); color: white; border: none; padding: 14px 28px;
            border-radius: 3px; font-size: 16px; font-weight: 600; cursor: pointer;
            width: 100%; transition: background 0.2s;
        }
        .btn-google:hover { background: #4752c4; }

        /* Основной Layout */
        .app-container { display: flex; width: 100%; height: 100%; display: none; }

        /* Сайдбар */
        .sidebar { width: 280px; background: var(--bg-light); display: flex; flex-direction: column; }
        .sidebar-header { 
            padding: 15px; height: 60px; border-bottom: 1px solid #232428;
            display: flex; justify-content: space-between; align-items: center;
        }
        .user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-card {
            padding: 10px; border-radius: 4px; cursor: pointer;
            display: flex; align-items: center; margin-bottom: 2px;
        }
        .user-card:hover { background: rgba(78, 80, 88, 0.3); }
        .user-card.active { background: rgba(78, 80, 88, 0.6); color: var(--white); }
        .status { width: 10px; height: 10px; border-radius: 50%; margin-right: 12px; background: #80848e; }
        .status.online { background: #23a559; }

        /* Чат */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #313338; }
        .chat-header { height: 60px; padding: 0 20px; display: flex; align-items: center; border-bottom: 1px solid #232428; font-weight: bold; }
        .messages-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .message { max-width: 80%; display: flex; flex-direction: column; }
        .message.me { align-self: flex-end; align-items: flex-end; }
        .msg-content { padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; }
        .me .msg-content { background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .other .msg-content { background: #383a40; border-bottom-left-radius: 2px; }

        /* Лента */
        .news-feed { width: 300px; background: var(--bg-light); border-left: 1px solid #232428; display: flex; flex-direction: column; }
        .feed-header { padding: 15px; font-weight: bold; border-bottom: 1px solid #232428; }
        .feed-content { flex: 1; overflow-y: auto; padding: 10px; }
        .post { background: #383a40; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
        .post b { color: var(--accent); display: block; margin-bottom: 4px; }

        /* Ввод */
        .input-area { padding: 20px; background: #313338; }
        .input-wrapper { 
            background: #383a40; border-radius: 8px; padding: 10px 15px;
            display: flex; align-items: center; gap: 10px;
        }
        input { 
            background: transparent; border: none; color: var(--text-main);
            flex: 1; outline: none; font-size: 15px; 
        }
        .btn-send { background: var(--accent); border: none; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-screen">
    <div class="login-box">
        <h2>С возвращением!</h2>
        <p>Мы так рады, что вы снова с нами!</p>
        <button id="googleBtn" class="btn-google">Войти через Google</button>
    </div>
</div>

<div id="appContainer" class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <span id="myName" style="font-weight: bold; font-size: 14px;">Пользователь</span>
            <button id="logoutBtn" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:12px;">Выйти</button>
        </div>
        <div class="user-list" id="usersList"></div>
    </div>

    <div class="chat-main">
        <div class="chat-header" id="chatTitle">Выберите, кому написать</div>
        <div class="messages-box" id="messagesBox"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="msgInput" placeholder="Написать сообщение...">
                <button id="sendBtn" class="btn-send">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <div class="news-feed">
        <div class="feed-header">Публичная лента</div>
        <div style="padding: 10px;">
            <input type="text" id="postInput" placeholder="Что нового?" style="background:#1e1f22; width:100%; padding:10px; border-radius:4px; margin-bottom:10px;">
            <button id="postBtn" class="btn-send" style="width:100%">Опубликовать</button>
        </div>
        <div class="feed-content" id="postsBox"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://gstatic.com";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://gstatic.com";
import { getFirestore, collection, addDoc, setDoc, doc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://gstatic.com";

const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "://firebaseapp.com",
  projectId: "test-da803",
  storageBucket: "test-da803.firebasestorage.app",
  messagingSenderId: "501020279316",
  appId: "1:501020279316:web:7acd5a849fcd0df318dd01"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentChatId = null;
let unsubMessages = null;

// --- СОБЫТИЯ (Ставим через JS, чтобы точно сработало) ---
const googleBtn = document.getElementById('googleBtn');
googleBtn.onclick = async () => {
    console.log("Попытка входа...");
    const provider = new GoogleAuthProvider();
    try {
        await signInWithPopup(auth, provider);
    } catch (e) {
        console.error("Критическая ошибка:", e);
        alert("Блокировка Firebase! Зайди в консоль и добавь домен в Authorized Domains. Код: " + e.code);
    }
};

document.getElementById('logoutBtn').onclick = () => signOut(auth);
document.getElementById('sendBtn').onclick = sendMessage;
document.getElementById('postBtn').onclick = createPost;
document.getElementById('msgInput').onkeydown = (e) => { if(e.key === 'Enter') sendMessage(); };

// --- ГЛАВНЫЙ ЦИКЛ ---
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('appContainer').style.display = 'flex';
        document.getElementById('myName').innerText = user.displayName;
        
        await setDoc(doc(db, "users", user.uid), {
            name: user.displayName,
            online: true,
            lastSeen: serverTimestamp()
        }, { merge: true });

        loadUsers();
        loadPosts();
    } else {
        document.getElementById('loginOverlay').classList.remove('hidden');
        document.getElementById('appContainer').style.display = 'none';
    }
});

async function sendMessage() {
    const input = document.getElementById('msgInput');
    if (!input.value.trim() || !currentChatId) return;
    await addDoc(collection(db, "messages"), {
        chatId: currentChatId,
        senderId: currentUser.uid,
        text: input.value,
        createdAt: serverTimestamp()
    });
    input.value = "";
}

async function createPost() {
    const input = document.getElementById('postInput');
    if (!input.value.trim()) return;
    await addDoc(collection(db, "posts"), {
        author: currentUser.displayName,
        text: input.value,
        createdAt: serverTimestamp()
    });
    input.value = "";
}

function loadUsers() {
    onSnapshot(collection(db, "users"), (snap) => {
        const list = document.getElementById("usersList");
        list.innerHTML = "";
        snap.forEach(uDoc => {
            if (uDoc.id === currentUser.uid) return;
            const data = uDoc.data();
            const div = document.createElement("div");
            div.className = `user-card ${currentChatId && currentChatId.includes(uDoc.id) ? 'active' : ''}`;
            div.innerHTML = `<span class="status ${data.online ? 'online' : ''}"></span> ${data.name}`;
            div.onclick = () => openChat(uDoc.id, data.name);
            list.appendChild(div);
        });
    });
}

function openChat(otherUid, name) {
    currentChatId = [currentUser.uid, otherUid].sort().join("_");
    document.getElementById("chatTitle").innerText = name;
    
    // Обновляем список чтобы выделить активный чат
    loadUsers();

    if (unsubMessages) unsubMessages();
    const q = query(collection(db, "messages"), where("chatId", "==", currentChatId), orderBy("createdAt", "asc"));
    
    unsubMessages = onSnapshot(q, (snap) => {
        const box = document.getElementById("messagesBox");
        box.innerHTML = "";
        snap.forEach(m => {
            const d = m.data();
            const div = document.createElement("div");
            div.className = `message ${d.senderId === currentUser.uid ? 'me' : 'other'}`;
            div.innerHTML = `<div class="msg-content">${d.text}</div>`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

function loadPosts() {
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snap) => {
        const box = document.getElementById("postsBox");
        box.innerHTML = "";
        snap.forEach(p => {
            const d = p.data();
            const div = document.createElement("div");
            div.className = "post";
            div.innerHTML = `<b>${d.author}</b> ${d.text}`;
            box.appendChild(div);
        });
    });
}
</script>
</body>
</html>
