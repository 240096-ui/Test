<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Messenger</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 320px;
    background: #17212b;
    color: white;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    font-weight: bold;
    border-bottom: 1px solid #222;
}

.user {
    padding: 12px;
    cursor: pointer;
    border-bottom: 1px solid #222;
}

.user:hover {
    background: #1f2a36;
}

.status {
    font-size: 12px;
    color: #aaa;
}

/* CHAT */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-header {
    padding: 15px;
    border-bottom: 1px solid #ddd;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #e6ecf0;
}

.msg {
    margin: 5px 0;
    max-width: 60%;
    padding: 10px;
    border-radius: 10px;
}

.me {
    background: #2b5278;
    color: white;
    margin-left: auto;
}

.other {
    background: white;
}

.input {
    display: flex;
    border-top: 1px solid #ddd;
}

.input input {
    flex: 1;
    padding: 15px;
    border: none;
}

.input button {
    padding: 15px;
    border: none;
    background: #2b5278;
    color: white;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="header">
        <input id="name" placeholder="Твое имя" style="width:100%; padding:8px;">
        <button onclick="login()">Войти</button>
    </div>

    <div id="users"></div>
</div>

<div class="chat">
    <div class="chat-header" id="chatTitle">Выбери чат</div>
    <div class="messages" id="messages"></div>

    <div class="input">
        <input id="text" placeholder="Сообщение...">
        <button onclick="send()">▶</button>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    doc,
    setDoc,
    serverTimestamp,
    query,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "test-da803.firebaseapp.com",
  projectId: "test-da803",
  storageBucket: "test-da803.firebasestorage.app",
  messagingSenderId: "501020279316",
  appId: "1:501020279316:web:7acd5a849fcd0df318dd01",
  measurementId: "G-XYN6569D33"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;
let currentChat = null;

// LOGIN (простой и стабильный)
window.login = async () => {
    const name = document.getElementById("name").value.trim();
    if (!name) return alert("Введи имя");

    currentUser = name;

    await setDoc(doc(db, "users", name), {
        name,
        online: true,
        lastSeen: serverTimestamp()
    });

    loadUsers();
};

// USERS
function loadUsers() {

    onSnapshot(collection(db, "users"), (snap) => {

        const list = document.getElementById("users");
        list.innerHTML = "";

        snap.forEach(docItem => {

            const u = docItem.data();
            if (u.name === currentUser) return;

            const div = document.createElement("div");
            div.className = "user";

            div.innerHTML = `
                ${u.name}
                <div class="status">
                    ${u.online ? "online" : "offline"}
                </div>
            `;

            div.onclick = () => openChat(u.name);

            list.appendChild(div);
        });
    });
}

// OPEN CHAT
function openChat(user) {
    currentChat = [currentUser, user].sort().join("_");
    document.getElementById("chatTitle").innerText = user;

    loadMessages();
}

// SEND
window.send = async () => {

    const text = document.getElementById("text").value;

    if (!text || !currentChat) return;

    await addDoc(collection(db, "messages"), {
        chatId: currentChat,
        sender: currentUser,
        text,
        createdAt: serverTimestamp()
    });

    document.getElementById("text").value = "";
};

// LOAD
function loadMessages() {

    const q = query(collection(db, "messages"), orderBy("createdAt"));

    onSnapshot(q, (snap) => {

        const box = document.getElementById("messages");
        box.innerHTML = "";

        snap.forEach(docItem => {

            const m = docItem.data();
            if (m.chatId !== currentChat) return;

            const div = document.createElement("div");
            div.className = "msg";

            if (m.sender === currentUser) {
                div.classList.add("me");
            } else {
                div.classList.add("other");
            }

            div.innerText = m.text;

            box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
    });
}

// OFFLINE
window.addEventListener("beforeunload", async () => {
    if (!currentUser) return;

    await setDoc(doc(db, "users", currentUser), {
        online: false,
        lastSeen: serverTimestamp()
    }, { merge: true });
});

</script>

</body>
</html>
