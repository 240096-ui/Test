<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Cloud Project</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f0f2f5; }
        .form-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h3 { margin-top: 0; color: #1a73e8; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        button { width: 100%; padding: 12px; background: #1a73e8; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; transition: background 0.3s; font-size: 16px; }
        button:hover { background: #1557b0; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
        <input type="text" id="userName" placeholder="Ваше имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <button type="submit" id="submitBtn">Отправить в облако</button>
    </form>
</div>

<script type="module">
    // 1. ПРАВИЛЬНЫЕ ИМПОРТЫ (с полными путями к JS-файлам)
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, addDoc } from "https://gstatic.com";

    // 2. Ваша конфигурация проекта
    const firebaseConfig = {
        apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
        authDomain: "://firebaseapp.com",
        projectId: "test-da803",
        storageBucket: "test-da803.firebasestorage.app",
        messagingSenderId: "501020279316",
        appId: "1:501020279316:web:7acd5a849fcd0df318dd01",
        measurementId: "G-XYN6569D33"
    };

    // 3. Инициализация
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 4. Логика формы
    const form = document.getElementById("feedbackForm");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        // Блокируем кнопку, чтобы не нажали дважды
        btn.disabled = true;
        btn.innerText = "Отправка...";

        const name = document.getElementById("userName").value;
        const email = document.getElementById("userEmail").value;

        try {
            // Запись в Firestore (коллекция "requests")
            const docRef = await addDoc(collection(db, "requests"), {
                name: name,
                email: email,
                timestamp: new Date()
            });

            console.log("Документ записан с ID: ", docRef.id);
            alert("✅ Успешно! Данные сохранены в Firebase.");
            form.reset();
        } catch (error) {
            console.error("Ошибка Firebase: ", error);
            alert("❌ Ошибка: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Отправить в облако";
        }
    });
</script>

</body>
</html>
