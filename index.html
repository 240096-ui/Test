<!DOCTYPE html>

<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button#mainBtn:hover { background: #0056b3; }
        button#mainBtn:disabled { background: #ccc; cursor: not-allowed; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; }
        .like-btn:hover { background: #e2e6ea; }
        .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>

<div class="container">
    <h3>Панель управления данными</h3>
    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Рабочий Email">
    <button id="mainBtn">Опубликовать в облако</button>
</div>

<input type="text" id="search" placeholder="🔍 Поиск по имени..." style="width:100%; max-width:500px; margin-top:10px; padding:10px;">

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
    getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
    serverTimestamp, updateDoc, doc, increment, deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyCMsArqXBXjYxljZs-1tX0kuOUSIkDDnZA",
    authDomain: "andrey-93159.firebaseapp.com",
    projectId: "andrey-93159",
    storageBucket: "andrey-93159.firebasestorage.app",
    messagingSenderId: "979105278949",
    appId: "1:979105278949:web:216260e4c80d99d7d29d0c",
    measurementId: "G-G5C0T3YYE8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPosts = [];

// VALIDATION
function validateForm(name, email) {
    if (!name || name.length < 2) {
        alert("Имя слишком короткое");
        return false;
    }
    if (!email.includes("@")) {
        alert("Некорректный email");
        return false;
    }
    return true;
}

// DELETE
window.deletePost = async (id) => {
    await deleteDoc(doc(db, "requests", id));
};

// EDIT
window.editName = async (id, oldName) => {
    const newName = prompt("Новое имя:", oldName);
    if (!newName) return;

    await updateDoc(doc(db, "requests", id), {
        name: newName
    });
};

// LIKE
window.processLike = async (id) => {
    await updateDoc(doc(db, "requests", id), {
        likes: increment(1)
    });
};

// ✅ ИСПРАВЛЕНО
// ПУБЛИКАЦИЯ НОВОЙ ЗАПИСИ С ВАЛИДАЦИЕЙ
document.getElementById('mainBtn').onclick = async () => {
    const btn = document.getElementById('mainBtn');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');

    btn.disabled = true;

    if (!validateForm(nameInput.value, emailInput.value)) {
        btn.disabled = false;
        return;
    }

    await addDoc(collection(db, "requests"), {
        name: nameInput.value,
        email: emailInput.value,
        likes: 0,
        timestamp: serverTimestamp()
    });

    nameInput.value = "";
    emailInput.value = "";
    btn.disabled = false;
};

// RENDER
function renderPosts(posts) {
    const feed = document.getElementById('feed');
    feed.innerHTML = "";

    posts.forEach((item) => {
        const date = item.timestamp ? item.timestamp.toDate().toLocaleString() : '...';

        feed.innerHTML += `
            <div class="post">
                <span class="time">${date}</span>
                <b>${item.name}</b>
                <p>${item.email}</p>

                <button class="like-btn" onclick="processLike('${item.id}')">
                    👍 ${item.likes || 0}
                </button>

                <button onclick="editName('${item.id}', '${item.name}')">✏️</button>
                <button onclick="deletePost('${item.id}')">🗑</button>
            </div>
        `;
    });
}

// REALTIME
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
    allPosts = [];
    snapshot.forEach((docItem) => {
        allPosts.push({
            id: docItem.id,
            ...docItem.data()
        });
    });
    renderPosts(allPosts);
});

// SEARCH
document.getElementById('search').addEventListener('input', (e) => {
    const value = e.target.value.toLowerCase().trim();

    if (!value) return renderPosts(allPosts);

    const filtered = allPosts.filter(post =>
        post.name.toLowerCase().includes(value)
    );

    renderPosts(filtered);
});
</script>

</body>
</html>
