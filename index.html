<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Pro</title>

<style>
body {
  margin:0;
  background:#eef1f5;
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.app {
  width:900px;
  height:600px;
  background:#fff;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
.header {
  padding:15px;
  text-align:center;
  border-bottom:1px solid #eee;
  font-weight:bold;
}

/* TABS */
.tabs {
  display:flex;
  border-bottom:1px solid #eee;
}

.tab {
  flex:1;
  text-align:center;
  padding:10px;
  cursor:pointer;
}

.tab.active {
  border-bottom:3px solid #0084ff;
  font-weight:bold;
}

/* CONTENT */
.content {
  flex:1;
  display:flex;
}

/* USERS */
.users {
  width:200px;
  border-right:1px solid #eee;
  overflow:auto;
}

.user {
  padding:10px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
}

.user:hover {
  background:#f5f5f5;
}

.avatar {
  width:35px;
  height:35px;
  border-radius:50%;
  background:#0084ff;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CHAT */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  padding:10px;
  overflow:auto;
  background:#f7f7f7;
}

.msg {
  margin:5px 0;
  max-width:70%;
  padding:8px 12px;
  border-radius:15px;
}

.me {
  background:#0084ff;
  color:#fff;
  margin-left:auto;
}

.other {
  background:#fff;
}

.input {
  display:flex;
  padding:10px;
  border-top:1px solid #eee;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

button {
  margin-left:10px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#0084ff;
  color:#fff;
  cursor:pointer;
}

/* POSTS */
.posts {
  padding:10px;
  width:100%;
}

.post {
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

/* LOGIN */
.overlay {
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div id="loginOverlay" class="overlay">
  <button onclick="loginGoogle()">Войти через Google</button>
</div>

<div class="app">
  <div class="header" id="myName">...</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('chat')">Чаты</div>
    <div class="tab" onclick="switchTab('posts')">Посты</div>
  </div>

  <div class="content" id="chatTab">
    <div class="users" id="users"></div>

    <div class="chat">
      <div id="messages" class="messages"></div>

      <div class="input">
        <input id="msgInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <div class="content" id="postsTab" style="display:none;">
    <div class="posts">
      <div class="input">
        <input id="postInput" placeholder="Что нового?">
        <button onclick="createPost()">Опубликовать</button>
      </div>
      <div id="posts"></div>
    </div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, setDoc, doc, query, onSnapshot, serverTimestamp, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ТВОЙ_API_KEY",
  authDomain: "ТВОЙ_PROJECT.firebaseapp.com",
  projectId: "ТВОЙ_PROJECT",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentChatId = null;
let unsub = null;

// AUTH
window.loginGoogle = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user;
    loginOverlay.style.display="none";
    myName.innerText = user.displayName;

    await setDoc(doc(db,"users",user.uid),{
      name:user.displayName,
      online:true
    },{merge:true});

    loadUsers();
    loadPosts();
  }
});

// USERS
function loadUsers(){
  onSnapshot(collection(db,"users"),snap=>{
    users.innerHTML="";
    snap.forEach(u=>{
      if(u.id===currentUser.uid) return;

      const div=document.createElement("div");
      div.className="user";
      div.innerHTML=`
        <div class="avatar">${u.data().name[0]}</div>
        ${u.data().name}
      `;
      div.onclick=()=>openChat(u.id);
      users.appendChild(div);
    });
  });
}

// CHAT
window.openChat=(uid)=>{
  currentChatId=[currentUser.uid,uid].sort().join("_");

  if(unsub) unsub();

  const q=query(collection(db,"messages"),
    where("chatId","==",currentChatId),
    orderBy("createdAt")
  );

  unsub=onSnapshot(q,snap=>{
    messages.innerHTML="";
    snap.forEach(m=>{
      const d=m.data();
      const div=document.createElement("div");
      div.className="msg "+(d.sender===currentUser.uid?"me":"other");
      div.innerText=d.text;
      messages.appendChild(div);
    });
  });
};

window.sendMessage=async()=>{
  if(!msgInput.value) return;

  await addDoc(collection(db,"messages"),{
    text:msgInput.value,
    sender:currentUser.uid,
    chatId:currentChatId,
    createdAt:serverTimestamp()
  });

  msgInput.value="";
};

// POSTS
window.createPost=async()=>{
  if(!postInput.value) return;

  await addDoc(collection(db,"posts"),{
    text:postInput.value,
    author:currentUser.displayName,
    createdAt:serverTimestamp()
  });

  postInput.value="";
};

function loadPosts(){
  const q=query(collection(db,"posts"),orderBy("createdAt","desc"));

  onSnapshot(q,snap=>{
    posts.innerHTML="";
    snap.forEach(p=>{
      const d=p.data();
      const div=document.createElement("div");
      div.className="post";
      div.innerHTML="<b>"+d.author+"</b><br>"+d.text;
      posts.appendChild(div);
    });
  });
}

// TABS
window.switchTab=(tab)=>{
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  if(tab==="chat"){
    chatTab.style.display="flex";
    postsTab.style.display="none";
    document.querySelectorAll(".tab")[0].classList.add("active");
  }else{
    chatTab.style.display="none";
    postsTab.style.display="flex";
    document.querySelectorAll(".tab")[1].classList.add("active");
  }
};

</script>

</body>
</html>
