<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Private Chat</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        #googleBtn { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #googleBtn:hover { background: #0056b3; }
        .hidden { display: none !important; }
        #app { background: white; width: 100%; max-width: 500px; height: 80vh; border-radius: 15px; display: flex; flex-direction: column; padding: 20px; }
    </style>
</head>
<body>

<!-- ОКНО ВХОДА -->
<div id="loginOverlay" class="login-card">
    <h2 style="margin-bottom: 20px;">Вход в систему</h2>
    <button id="googleBtn">ВОЙТИ ЧЕРЕЗ GOOGLE</button>
</div>

<!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
<div id="app" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px;">
        <b id="userName">Пользователь</b>
        <button id="logoutBtn" style="color: red; border: none; background: none; cursor: pointer;">Выйти</button>
    </div>
    <div id="msgBox" style="flex: 1; overflow-y: auto; padding: 10px; background: #fafafa; margin: 10px 0;">
        <p style="color: #999; text-align: center;">Выберите контакт для общения</p>
    </div>
    <div style="display: flex; gap: 10px;">
        <input id="msgInput" type="text" placeholder="Сообщение..." style="flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none;">
        <button id="sendBtn" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer;">➤</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://gstatic.com";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://gstatic.com";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://gstatic.com";

const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "://firebaseapp.com",
  projectId: "test-da803",
  storageBucket: "test-da803.firebasestorage.app",
  messagingSenderId: "501020279316",
  appId: "1:501020279316:web:7acd5a849fcd0df318dd01"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// ПРИВЯЗКА КНОПКИ (самый надежный способ)
document.getElementById('googleBtn').onclick = () => {
    signInWithPopup(auth, provider)
        .then(() => console.log("Успешный вход"))
        .catch(err => {
            console.error(err);
            alert("ОШИБКА: Скорее всего, ты не добавил домен в консоли Firebase! Код: " + err.code);
        });
};

document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('userName').innerText = user.displayName;
    }
});
</script>
</body>
</html>
