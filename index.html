<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Messenger</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    height: 100vh;
}

/* LEFT PANEL */
.sidebar {
    width: 30%;
    background: #f5f5f5;
    border-right: 1px solid #ddd;
    padding: 10px;
}

.user {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}

.online {
    color: green;
    font-size: 12px;
}

/* CHAT */
.chat {
    width: 70%;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    background: #fafafa;
}

.msg {
    margin: 5px 0;
    max-width: 60%;
    padding: 8px;
    border-radius: 10px;
}

.me {
    background: #007bff;
    color: white;
    margin-left: auto;
}

.other {
    background: #e4e6eb;
}

.input {
    display: flex;
}

.input input {
    flex: 1;
    padding: 10px;
}

.input button {
    padding: 10px;
}
</style>
</head>

<body>

<div class="sidebar">
    <button onclick="login()">Войти через Google</button>
    <h3>Пользователи</h3>
    <div id="users"></div>
</div>

<div class="chat">
    <div id="chatTitle" style="padding:10px; border-bottom:1px solid #ddd;">
        Выберите чат
    </div>

    <div class="messages" id="messages"></div>

    <div class="input">
        <input id="text">
        <button onclick="send()">▶</button>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    onSnapshot,
    doc,
    setDoc,
    serverTimestamp,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "test-da803.firebaseapp.com",
  projectId: "test-da803",
  storageBucket: "test-da803.firebasestorage.app",
  messagingSenderId: "501020279316",
  appId: "1:501020279316:web:7acd5a849fcd0df318dd01",
  measurementId: "G-XYN6569D33"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
let currentChat = null;

// LOGIN
window.login = async () => {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
};

// AUTH STATE
onAuthStateChanged(auth, async (user) => {

    if (!user) return;

    currentUser = user;

    // сохранить пользователя
    await setDoc(doc(db, "users", user.uid), {
        name: user.displayName,
        email: user.email,
        online: true,
        lastSeen: serverTimestamp()
    }, { merge: true });

    loadUsers();
});

// USERS LIST
function loadUsers() {

    onSnapshot(collection(db, "users"), (snap) => {

        const list = document.getElementById("users");
        list.innerHTML = "";

        snap.forEach(docItem => {

            const u = docItem.data();

            if (docItem.id === currentUser.uid) return;

            const div = document.createElement("div");
            div.className = "user";

            div.innerHTML = `
                ${u.name}
                <div class="online">
                    ${u.online ? "online" : "offline"}
                </div>
            `;

            div.onclick = () => openChat(docItem.id, u.name);

            list.appendChild(div);
        });
    });
}

// OPEN CHAT
function openChat(userId, name) {

    currentChat = [currentUser.uid, userId].sort().join("_");

    document.getElementById("chatTitle").innerText = name;

    loadMessages();
}

// SEND
window.send = async () => {

    const text = document.getElementById("text").value;

    if (!text || !currentChat) return;

    await addDoc(collection(db, "messages"), {
        chatId: currentChat,
        sender: currentUser.uid,
        text,
        createdAt: serverTimestamp()
    });

    document.getElementById("text").value = "";
};

// LOAD MESSAGES
function loadMessages() {

    const q = query(collection(db, "messages"), orderBy("createdAt"));

    onSnapshot(q, (snap) => {

        const box = document.getElementById("messages");
        box.innerHTML = "";

        snap.forEach(docItem => {

            const m = docItem.data();

            if (m.chatId !== currentChat) return;

            const div = document.createElement("div");
            div.className = "msg";

            if (m.sender === currentUser.uid) {
                div.classList.add("me");
            } else {
                div.classList.add("other");
            }

            div.innerText = m.text;

            box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
    });
}

// OFFLINE
window.addEventListener("beforeunload", async () => {
    if (!currentUser) return;

    await setDoc(doc(db, "users", currentUser.uid), {
        online: false,
        lastSeen: serverTimestamp()
    }, { merge: true });
});

</script>
</body>
</html>
