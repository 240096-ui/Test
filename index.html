<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud Chat</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .btn { background: #4285f4; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        #chat-app { display: none; width: 400px; height: 500px; background: white; border-radius: 12px; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 15px; background: #e1e1e1; align-self: flex-start; max-width: 80%; }
        .my-msg { align-self: flex-end; background: #4285f4; color: white; }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <h2>Private Cloud Chat</h2>
    <p id="status">Загрузка библиотек...</p>
    <button class="btn" id="loginBtn" style="display:none;">Войти через Google</button>
</div>

<div id="chat-app">
    <div style="padding:15px; background:#4285f4; color:white; display:flex; justify-content:space-between;">
        <span id="uName">Чат</span>
        <button id="logoutBtn" style="color:white; background:none; border:1px solid white; cursor:pointer;">Выход</button>
    </div>
    <div id="messages"></div>
    <div style="padding:10px; display:flex; gap:5px;">
        <input type="text" id="mInput" style="flex:1; padding:8px;" placeholder="Сообщение...">
        <button id="sendBtn" style="padding:8px 15px; background:#4285f4; color:white; border:none;">></button>
    </div>
</div>

<!-- Загружаем скрипты -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
        authDomain: "://firebaseapp.com",
        projectId: "test-da803",
        storageBucket: "test-da803.firebasestorage.app",
        messagingSenderId: "501020279316",
        appId: "1:501020279316:web:7acd5a849fcd0df318dd01"
    };

    // ФУНКЦИЯ ЗАПУСКА ПРИЛОЖЕНИЯ
    function initApp() {
        if (typeof firebase === 'undefined') {
            setTimeout(initApp, 500); // Если не загрузилось, ждем еще полсекунды
            return;
        }

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();

        document.getElementById('status').innerText = "Готово к работе";
        document.getElementById('loginBtn').style.display = 'inline-block';

        document.getElementById('loginBtn').onclick = () => auth.signInWithRedirect(provider);
        document.getElementById('logoutBtn').onclick = () => auth.signOut();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-app').style.display = 'flex';
                document.getElementById('uName').innerText = user.displayName;
                
                db.ref('messages').limitToLast(50).on('child_added', snap => {
                    const data = snap.val();
                    const div = document.createElement('div');
                    div.className = 'msg' + (data.uid === user.uid ? ' my-msg' : '');
                    div.innerHTML = `<b>${data.name}:</b> ${data.text}`;
                    document.getElementById('messages').appendChild(div);
                    document.getElementById('messages').scrollTop = 99999;
                });
            } else {
                document.getElementById('login-screen').style.display = 'block';
                document.getElementById('chat-app').style.display = 'none';
            }
        });

        document.getElementById('sendBtn').onclick = () => {
            const inp = document.getElementById('mInput');
            if (inp.value.trim() && auth.currentUser) {
                db.ref('messages').push({
                    name: auth.currentUser.displayName,
                    text: inp.value,
                    uid: auth.currentUser.uid
                });
                inp.value = '';
            }
        };
    }

    // Запускаем проверку загрузки
    window.onload = initApp;
</script>
</body>
</html>
