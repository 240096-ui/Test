<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Messenger</title>

<style>
body {
    font-family: Arial;
    background: #eef2f3;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.app {
    width: 400px;
    background: white;
    border-radius: 12px;
    padding: 15px;
}

.header {
    font-weight: bold;
    margin-bottom: 10px;
}

.users {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.user {
    background: #ddd;
    padding: 8px 12px;
    border-radius: 20px;
    cursor: pointer;
}

.chat {
    border: 1px solid #ddd;
    height: 300px;
    overflow-y: auto;
    padding: 10px;
    border-radius: 8px;
    background: #fafafa;
}

.msg {
    margin: 5px 0;
    max-width: 70%;
    padding: 8px;
    border-radius: 10px;
}

.me {
    background: #007bff;
    color: white;
    margin-left: auto;
}

.other {
    background: #e4e6eb;
}

.inputBox {
    display: flex;
    margin-top: 10px;
}

.inputBox input {
    flex: 1;
    padding: 10px;
}

.inputBox button {
    padding: 10px;
    background: #007bff;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="app">

<div class="header">Выберите собеседника:</div>

<div class="users">
    <div class="user" onclick="selectUser('Азамат')">А</div>
    <div class="user" onclick="selectUser('Максим')">М</div>
</div>

<div id="chatTitle">Чат не выбран</div>

<div class="chat" id="chat"></div>

<div class="inputBox">
    <input id="msg" placeholder="Ваше сообщение...">
    <button onclick="send()">▶</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "test-da803.firebaseapp.com",
  projectId: "test-da803",
  storageBucket: "test-da803.firebasestorage.app",
  messagingSenderId: "501020279316",
  appId: "1:501020279316:web:7acd5a849fcd0df318dd01",
  measurementId: "G-XYN6569D33"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const currentUser = "Дуйсенбек"; // ← меняй под себя
let currentChat = null;

// выбрать пользователя
window.selectUser = (user) => {
    currentChat = [currentUser, user].sort().join("_");
    document.getElementById("chatTitle").innerText = "Чат с " + user;

    loadMessages();
};

// отправить
window.send = async () => {
    const text = document.getElementById("msg").value;

    if (!text || !currentChat) return;

    await addDoc(collection(db, "messages"), {
        chatId: currentChat,
        sender: currentUser,
        text: text,
        time: new Date()
    });

    document.getElementById("msg").value = "";
};

// загрузка сообщений
function loadMessages() {

    const q = query(collection(db, "messages"), orderBy("time"));

    onSnapshot(q, (snap) => {

        const chat = document.getElementById("chat");
        chat.innerHTML = "";

        snap.forEach(doc => {
            const d = doc.data();

            if (d.chatId !== currentChat) return;

            const div = document.createElement("div");
            div.classList.add("msg");

            if (d.sender === currentUser) {
                div.classList.add("me");
            } else {
                div.classList.add("other");
            }

            div.innerText = d.text;

            chat.appendChild(div);
        });

        chat.scrollTop = chat.scrollHeight;
    });
}

</script>

</body>
</html>
