<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Messenger</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; --text: #1c1e21; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); height: 100vh; overflow: hidden; }
        
        /* Окно входа (не на весь экран) */
        .login-card { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 40px; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; z-index: 1000;
        }
        .login-card h2 { margin-bottom: 20px; color: var(--text); }
        .hidden { display: none !important; }

        /* Основной интерфейс */
        .container { display: flex; width: 100%; height: 100vh; }
        
        .sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #f9f9f9; display: flex; align-items: center; transition: 0.2s; }
        .user-item:hover { background: #f0f2f5; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; background: #ccc; }
        .online { background: #42b72a; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; background: #f0f2f5; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 8px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: white; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        .posts-area { width: 320px; background: #f8f9fa; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        .posts-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .post-card { background: white; padding: 12px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); font-size: 13px; }
        .post-author { font-weight: bold; color: var(--primary); margin-bottom: 4px; display: block; }

        .input-box { padding: 15px; display: flex; gap: 10px; background: white; border-top: 1px solid #eee; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { padding: 8px 18px; background: var(--primary); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; }
        button.secondary { background: #e4e6eb; color: #050505; font-size: 11px; }
    </style>
</head>
<body>

<!-- Центрированное окно входа -->
<div id="loginOverlay" class="login-card">
    <h2>Messenger PRO</h2>
    <button id="googleBtn" style="padding: 15px 30px;">Войти через Google</button>
</div>

<!-- Основной контент (скрыт до логина) -->
<div id="mainContent" class="container hidden">
    <div class="sidebar">
        <div class="sidebar-header">
            <span id="myName" style="font-weight: bold;">Аккаунт</span>
            <button id="logoutBtn" class="secondary">Выйти</button>
        </div>
        <div class="user-list" id="usersList"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chatTitle">Выберите чат</div>
        <div class="messages" id="messagesBox"></div>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Напишите сообщение...">
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <div class="posts-area">
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid #ddd;">Публичная лента</div>
        <div class="input-box" style="padding: 10px;">
            <input type="text" id="postInput" placeholder="Что нового?">
            <button id="postBtn" style="padding: 5px 12px;">+</button>
        </div>
        <div class="posts-list" id="postsBox"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://gstatic.com";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://gstatic.com";
import { getFirestore, collection, addDoc, setDoc, doc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://gstatic.com";

const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "://firebaseapp.com",
  projectId: "test-da803",
  storageBucket: "test-da803.firebasestorage.app",
  messagingSenderId: "501020279316",
  appId: "1:501020279316:web:7acd5a849fcd0df318dd01"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentChatId = null;
let unsubMessages = null;

// --- ПРИВЯЗКА КНОПОК ЧЕРЕЗ JS (Так надежнее для модулей) ---
document.getElementById('googleBtn').onclick = () => {
    const provider = new GoogleAuthProvider();
    signInWithPopup(auth, provider).catch(e => alert("Ошибка входа: " + e.code));
};

document.getElementById('logoutBtn').onclick = () => signOut(auth);

document.getElementById('sendBtn').onclick = sendMessage;
document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

document.getElementById('postBtn').onclick = createPost;

// --- ЛОГИКА СОСТОЯНИЯ ---
onAuthStateChanged(auth, async (user) => {
    const overlay = document.getElementById("loginOverlay");
    const main = document.getElementById("mainContent");
    
    if (user) {
        currentUser = user;
        overlay.classList.add("hidden");
        main.classList.remove("hidden");
        document.getElementById("myName").innerText = user.displayName;
        
        await setDoc(doc(db, "users", user.uid), {
            name: user.displayName,
            online: true,
            lastSeen: serverTimestamp()
        }, { merge: true });

        loadUsers();
        loadPosts();
    } else {
        currentUser = null;
        overlay.classList.remove("hidden");
        main.classList.add("hidden");
    }
});

// --- ФУНКЦИИ ---
async function sendMessage() {
    const input = document.getElementById("msgInput");
    if (!input.value.trim() || !currentChatId) return;
    await addDoc(collection(db, "messages"), {
        chatId: currentChatId,
        senderId: currentUser.uid,
        text: input.value,
        createdAt: serverTimestamp()
    });
    input.value = "";
}

async function createPost() {
    const input = document.getElementById("postInput");
    if (!input.value.trim()) return;
    await addDoc(collection(db, "posts"), {
        author: currentUser.displayName,
        text: input.value,
        createdAt: serverTimestamp()
    });
    input.value = "";
}

function loadUsers() {
    onSnapshot(collection(db, "users"), (snap) => {
        const list = document.getElementById("usersList");
        list.innerHTML = "";
        snap.forEach(uDoc => {
            if (uDoc.id === currentUser.uid) return;
            const data = uDoc.data();
            const div = document.createElement("div");
            div.className = "user-item";
            div.innerHTML = `<span class="status-dot ${data.online ? 'online' : ''}"></span> ${data.name}`;
            div.onclick = () => openChat(uDoc.id, data.name);
            list.appendChild(div);
        });
    });
}

function openChat(otherUid, name) {
    currentChatId = [currentUser.uid, otherUid].sort().join("_");
    document.getElementById("chatTitle").innerText = "Чат с " + name;
    if (unsubMessages) unsubMessages();
    
    const q = query(collection(db, "messages"), where("chatId", "==", currentChatId), orderBy("createdAt", "asc"));
    unsubMessages = onSnapshot(q, (snap) => {
        const box = document.getElementById("messagesBox");
        box.innerHTML = "";
        snap.forEach(m => {
            const d = m.data();
            const div = document.createElement("div");
            div.className = `msg ${d.senderId === currentUser.uid ? 'me' : 'other'}`;
            div.innerText = d.text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

function loadPosts() {
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snap) => {
        const box = document.getElementById("postsBox");
        box.innerHTML = "";
        snap.forEach(p => {
            const d = p.data();
            const div = document.createElement("div");
            div.className = "post-card";
            div.innerHTML = `<span class="post-author">${d.author}</span>${d.text}`;
            box.appendChild(div);
        });
    });
}
</script>
</body>
</html>
