<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
}

.sidebar {
  width:250px;
  border-right:1px solid #ccc;
  overflow:auto;
}

.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg.me { text-align:right; }
.msg.other { text-align:left; }

.input {
  display:flex;
}

input { flex:1; padding:10px; }
button { padding:10px; }

.overlay {
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div id="loginOverlay" class="overlay">
  <button onclick="loginGoogle()">Войти через Google</button>
</div>

<div class="sidebar">
  <h3 id="myName">...</h3>
  <button onclick="logout()">Выйти</button>
  <div id="users"></div>
</div>

<div class="chat">
  <h3 id="chatTitle">Выбери чат</h3>
  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="msgInput">
    <button onclick="sendMessage()">Send</button>
  </div>

  <hr>

  <input id="postInput" placeholder="Пост...">
  <button onclick="createPost()">Опубликовать</button>
  <div id="posts"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
  getFirestore, collection, addDoc, setDoc, doc,
  query, onSnapshot, serverTimestamp, where, orderBy
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "test-da803.firebaseapp.com",
  projectId: "test-da803",
  storageBucket: "test-da803.firebasestorage.app",
  messagingSenderId: "501020279316",
  appId: "1:501020279316:web:7acd5a849fcd0df318dd01",
  measurementId: "G-XYN6569D33"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentChatId = null;
let unsub = null;

// LOGIN
window.loginGoogle = async () => {
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: "select_account" });

  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    alert(e.message);
  }
};

window.logout = () => signOut(auth);

// AUTH STATE
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    loginOverlay.style.display = "none";

    myName.innerText = user.displayName;

    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName,
      online: true,
      lastSeen: serverTimestamp()
    }, { merge:true });

    loadUsers();
    loadPosts();
  } else {
    loginOverlay.style.display = "flex";
  }
});

// USERS
function loadUsers(){
  onSnapshot(collection(db,"users"), snap=>{
    users.innerHTML="";
    snap.forEach(u=>{
      if(u.id===currentUser.uid) return;

      const div=document.createElement("div");
      div.innerText=u.data().name;
      div.onclick=()=>openChat(u.id,u.data().name);
      users.appendChild(div);
    });
  });
}

// OPEN CHAT
window.openChat = (uid,name)=>{
  currentChatId=[currentUser.uid,uid].sort().join("_");
  chatTitle.innerText=name;

  if(unsub) unsub();

  const q=query(
    collection(db,"messages"),
    where("chatId","==",currentChatId),
    orderBy("createdAt")
  );

  unsub=onSnapshot(q,snap=>{
    messages.innerHTML="";
    snap.forEach(m=>{
      const d=m.data();
      const div=document.createElement("div");
      div.className="msg "+(d.sender===currentUser.uid?"me":"other");
      div.innerText=d.text;
      messages.appendChild(div);
    });
  });
};

// SEND MESSAGE
window.sendMessage = async ()=>{
  const text=msgInput.value.trim();
  if(!text || !currentChatId) return;

  await addDoc(collection(db,"messages"),{
    text,
    sender:currentUser.uid,
    chatId:currentChatId,
    createdAt:serverTimestamp()
  });

  msgInput.value="";
};

// POSTS
window.createPost = async ()=>{
  const text=postInput.value.trim();
  if(!text) return;

  await addDoc(collection(db,"posts"),{
    text,
    author:currentUser.displayName,
    createdAt:serverTimestamp()
  });

  postInput.value="";
};

function loadPosts(){
  const q=query(collection(db,"posts"),orderBy("createdAt","desc"));

  onSnapshot(q,snap=>{
    posts.innerHTML="";
    snap.forEach(p=>{
      const d=p.data();
      const div=document.createElement("div");
      div.innerHTML="<b>"+d.author+"</b>: "+d.text;
      posts.appendChild(div);
    });
  });
}

</script>

</body>
</html>
