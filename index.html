<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #login-screen { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .google-btn { background-color: #4285f4; color: white; border: none; padding: 12px 24px; border-radius: 4px; font-size: 16px; font-weight: 500; cursor: pointer; }
        #chat-app { display: none; width: 400px; height: 500px; background: white; border-radius: 12px; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: #f9f9f9; border-bottom: 1px solid #eee; }
        .input-box { padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>Private Cloud Chat</h2>
    <button class="google-btn" id="btn-login">Войти через Google</button>
</div>

<div id="chat-app">
    <div style="padding: 15px; background: #4285f4; color: white; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between;">
        <span id="user-name">Чат</span>
        <button onclick="location.reload()" style="background: none; border: none; color: white; cursor: pointer;">Выйти</button>
    </div>
    <div id="messages"></div>
    <div class="input-box">
        <input type="text" id="msg-input" placeholder="Введите сообщение...">
        <button id="btn-send" style="padding: 10px 20px; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer;">></button>
    </div>
</div>

<!-- Используем другой способ подключения, чтобы избежать ошибки CORS -->
<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://gstatic.com";
    import { getDatabase, ref, push, onChildAdded } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
        authDomain: "://firebaseapp.com",
        projectId: "test-da803",
        storageBucket: "test-da803.firebasestorage.app",
        messagingSenderId: "501020279316",
        appId: "1:501020279316:web:7acd5a849fcd0df318dd01"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // Прямая привязка событий
    const loginBtn = document.getElementById('btn-login');
    const sendBtn = document.getElementById('btn-send');
    const msgInput = document.getElementById('msg-input');
    const messagesDiv = document.getElementById('messages');

    loginBtn.onclick = () => {
        signInWithPopup(auth, provider).catch(err => {
            console.error(err);
            alert("Ошибка входа! Проверьте, включен ли Google в Firebase Console.");
        });
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-app').style.display = 'flex';
            document.getElementById('user-name').innerText = user.displayName;
            
            // Слушаем новые сообщения
            onChildAdded(ref(db, 'messages'), (data) => {
                const m = data.val();
                const item = document.createElement('div');
                item.style.marginBottom = "10px";
                item.innerHTML = `<strong>${m.name}:</strong> ${m.text}`;
                messagesDiv.appendChild(item);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }
    });

    sendBtn.onclick = () => {
        if (msgInput.value.trim() && auth.currentUser) {
            push(ref(db, 'messages'), {
                name: auth.currentUser.displayName,
                text: msgInput.value
            });
            msgInput.value = '';
        }
    };
</script>

</body>
</html>
