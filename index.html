<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CloudApp</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef1f5;
}

.container{
  display:flex;
  height:100vh;
}

/* LEFT */
.left{
  width:260px;
  padding:15px;
}

.card{
  background:#fff;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.avatar{
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ff4d7a;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  margin:auto;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  cursor:pointer;
  border-radius:10px;
}

.user:hover{
  background:#f5f5f5;
}

/* CENTER */
.center{
  flex:1;
  padding:15px;
}

.postInput input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.btn{
  width:100%;
  padding:10px;
  background:#1877f2;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.post{
  background:#fff;
  padding:10px;
  border-radius:15px;
  margin-top:10px;
}

/* RIGHT CHAT */
.right{
  width:320px;
  padding:15px;
}

.messages{
  height:400px;
  overflow:auto;
  background:#f7f7f7;
  padding:10px;
  border-radius:10px;
}

.msg{
  padding:8px;
  margin:5px 0;
  border-radius:10px;
  max-width:70%;
}

.me{
  background:#1877f2;
  color:#fff;
  margin-left:auto;
}

.other{
  background:#fff;
}

.input{
  display:flex;
  margin-top:10px;
}

.input input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

.input button{
  margin-left:10px;
  padding:10px;
  border:none;
  border-radius:50%;
  background:#1877f2;
  color:#fff;
}

/* LOGIN */
.overlay{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div id="loginOverlay" class="overlay">
  <button onclick="loginGoogle()">Войти через Google</button>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="card">
      <div class="avatar" id="avatar">M</div>
      <h3 id="myName" style="text-align:center;"></h3>
      <p style="text-align:center;color:gray;">Online</p>
    </div>

    <div class="card">
      <b>Собеседники</b>
      <div id="users"></div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="card postInput">
      <b>Создать запись</b>
      <input id="postInput" placeholder="Что у вас нового?">
      <button class="btn" onclick="createPost()">Опубликовать</button>
    </div>

    <div id="posts"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="card">
      <div id="messages" class="messages"></div>

      <div class="input">
        <input id="msgInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, setDoc, doc, query, onSnapshot, serverTimestamp, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "test-da803.firebaseapp.com",
  projectId: "test-da803"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
let currentChatId=null;
let unsub=null;

// LOGIN
window.loginGoogle = async ()=>{
  const provider=new GoogleAuthProvider();
  await signInWithPopup(auth,provider);
};

onAuthStateChanged(auth, async(user)=>{
  if(user){
    currentUser=user;
    loginOverlay.style.display="none";

    myName.innerText=user.displayName;
    avatar.innerText=user.displayName[0];

    await setDoc(doc(db,"users",user.uid),{
      name:user.displayName
    },{merge:true});

    loadUsers();
    loadPosts();
  }
});

// USERS
function loadUsers(){
  onSnapshot(collection(db,"users"),snap=>{
    users.innerHTML="";
    snap.forEach(u=>{
      if(u.id===currentUser.uid) return;

      const div=document.createElement("div");
      div.className="user";
      div.innerHTML=`<div class="avatar">${u.data().name[0]}</div>${u.data().name}`;
      div.onclick=()=>openChat(u.id);

      users.appendChild(div);
    });
  });
}

// CHAT
window.openChat=(uid)=>{
  currentChatId=[currentUser.uid,uid].sort().join("_");

  if(unsub) unsub();

  const q=query(collection(db,"messages"),
    where("chatId","==",currentChatId),
    orderBy("createdAt")
  );

  unsub=onSnapshot(q,snap=>{
    messages.innerHTML="";
    snap.forEach(m=>{
      const d=m.data();
      const div=document.createElement("div");
      div.className="msg "+(d.sender===currentUser.uid?"me":"other");
      div.innerText=d.text;
      messages.appendChild(div);
    });
  });
};

window.sendMessage=async()=>{
  if(!msgInput.value) return;

  await addDoc(collection(db,"messages"),{
    text:msgInput.value,
    sender:currentUser.uid,
    chatId:currentChatId,
    createdAt:serverTimestamp()
  });

  msgInput.value="";
};

// POSTS
window.createPost=async()=>{
  if(!postInput.value) return;

  await addDoc(collection(db,"posts"),{
    text:postInput.value,
    author:currentUser.displayName,
    createdAt:serverTimestamp()
  });

  postInput.value="";
};

function loadPosts(){
  const q=query(collection(db,"posts"),orderBy("createdAt","desc"));

  onSnapshot(q,snap=>{
    posts.innerHTML="";
    snap.forEach(p=>{
      const d=p.data();
      const div=document.createElement("div");
      div.className="post";
      div.innerHTML="<b>"+d.author+"</b><br>"+d.text;
      posts.appendChild(div);
    });
  });
}

</script>
</body>
</html>
