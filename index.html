<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Монитор статусов и сессий</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: #f4f6f9;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card {
  width: 360px;
  background: white;
  padding: 24px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,.05);
  box-sizing: border-box;
  text-align: center;
}

h2 {
  font-size: 18px;
  color: #111827;
  margin-top: 0;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* Блок профиля и Google */
.user-name {
  font-size: 18px;
  font-weight: bold;
  color: #111827;
  margin-bottom: 12px;
}

.timer {
  font-size: 28px;
  font-weight: bold;
  color: #2563eb;
  margin: 15px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* Кнопки управления */
.btn-main {
  width: 100%;
  border: none;
  padding: 14px;
  border-radius: 12px;
  cursor: pointer;
  color: white;
  font-weight: bold;
  font-size: 15px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: opacity 0.2s;
}

.btn-main:hover, .btn-sub:hover { opacity: 0.9; }

.btn-session-start { background: #22c55e; }
.btn-session-stop { background: #dc2626; }
.btn-google { background: #4285F4; }

.sub-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.btn-sub {
  border: none;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  color: white;
  font-weight: bold;
  font-size: 14px;
}

.btn-break { background: #f59e0b; color: white; }
.btn-logout { background: #6b7280; }

/* Список группы */
.monitor-title { justify-content: flex-start; font-weight: bold; }
ul { list-style: none; padding: 0; margin: 0; text-align: left; }
li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid #f3f4f6;
}
li:last-child { border-bottom: none; }

.user-info { display: flex; align-items: center; gap: 8px; font-weight: bold; color: #111827; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; }
.status-dot.active { background: #22c55e; }
.status-dot.break { background: #f59e0b; }

.user-meta { text-align: right; font-size: 12px; color: #6b7280; }
.location { display: flex; align-items: center; justify-content: flex-end; gap: 4px; color: #374151; font-size: 13px; margin-bottom: 2px;}

/* Чат */
.chat-box {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  height: 180px;
  overflow-y: auto;
  padding: 12px;
  text-align: left;
  font-size: 14px;
  margin-bottom: 12px;
}
.chat-msg { margin-bottom: 8px; line-height: 1.4; color: #374151; }
.chat-msg strong { color: #111827; }

.chat-input-row {
  display: flex;
  gap: 8px;
}
.chat-input {
  flex: 1;
  border: 1px solid #e5e7eb;
  padding: 12px;
  border-radius: 10px;
  outline: none;
  font-size: 14px;
}
.btn-send {
  background: #10b981;
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}
</style>
</head>
<body>

<div class="card">
  <div id="auth-block">
    <div class="user-name">Авторизация</div>
    <button class="btn-main btn-google" onclick="loginWithGoogle()">🔑 Войти через Google</button>
  </div>

  <div id="app-block" style="display: none;">
    <div class="user-name" id="my-name">Загрузка...</div>
    <div class="timer">⏱️ <span id="timer-val">00 сек.</span></div>
    
    <button id="session-btn" class="btn-main btn-session-start" onclick="toggleSession()">▶️ Начать сессию</button>
    
    <div class="sub-buttons">
      <button class="btn-sub btn-break" onclick="setBreak()">☕ Перерыв</button>
      <button class="btn-sub btn-logout" onclick="logout()">Выход</button>
    </div>
  </div>
</div>

<div class="card">
  <h2 class="monitor-title">👥 Монитор группы</h2>
  <ul id="users-list"></ul>
</div>

<div class="card">
  <h2>💬 Общий чат</h2>
  <div class="chat-box" id="chat-box"></div>
  <div class="chat-input-row">
    <input type="text" id="chat-input" class="chat-input" placeholder="Сообщение..." onkeypress="handleKeyPress(event)">
    <button class="btn-send" onclick="sendMessage()">➔</button>
  </div>
</div>

<script>
// ВАШИ КЛЮЧИ И БАЗА СОХРАНЕНЫ СЛОВО В СЛОВО
const SUPABASE_URL = 'https://lyjdlgxhocscvwbcwrtc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5amRsZ3hob2NzY3Z3YmN3cnRjIiwicm9sZSI6Imfub24iLCJpYXQiOjE3NzY2ODQzMTEsImV4cCI6MjA5MjI2MDMxMX0.X0ua0z3bDdOzxR6gCTMhRa8La5RhDuKzMMBlH60_1R0';

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let myProfile = null;
let timerInterval = null;
let secondsElapsed = 0;
let isSessionActive = false;

// --- Авторизация Google ---
async function checkUser() {
  const { data: { user } } = await client.auth.getUser();
  if (user) {
    currentUser = user;
    document.getElementById('auth-block').style.display = 'none';
    document.getElementById('app-block').style.display = 'block';
    await syncProfile();
  } else {
    document.getElementById('auth-block').style.display = 'block';
    document.getElementById('app-block').style.display = 'none';
  }
  loadUsers();
  loadMessages();
}

async function loginWithGoogle() {
  await client.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
}

async function logout() {
  clearInterval(timerInterval);
  await updateStatus('Не в сети');
  await client.auth.signOut();
  window.location.reload();
}

async function syncProfile() {
  const { data } = await client.from('profiles').select('*').eq('id', currentUser.id).single();
  if (data) {
    myProfile = data;
    document.getElementById('my-name').textContent = data.username;
    if (data.status === 'Работает') {
      startTimerLogic();
    }
  }
}

// --- Логика Таймера и Статусов ---
async function updateStatus(status) {
  if (!currentUser) return;
  await client.from('profiles').update({ status }).eq('id', currentUser.id);
}

function toggleSession() {
  const btn = document.getElementById('session-btn');
  if (!isSessionActive) {
    // Старт сессии
    isSessionActive = true;
    btn.className = "btn-main btn-session-stop";
    btn.textContent = "⛔ Завершить сессию";
    updateStatus('Работает');
    startTimerLogic();
  } else {
    // Стоп сессии
    isSessionActive = false;
    btn.className = "btn-main btn-session-start";
    btn.textContent = "▶️ Начать сессию";
    updateStatus('Не в сети');
    clearInterval(timerInterval);
    secondsElapsed = 0;
    document.getElementById('timer-val').textContent = "00 сек.";
  }
}

function startTimerLogic() {
  isSessionActive = true;
  const btn = document.getElementById('session-btn');
  btn.className = "btn-main btn-session-stop";
  btn.textContent = "⛔ Завершить сессию";
  
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    secondsElapsed++;
    let m = Math.floor(secondsElapsed / 60);
    let s = secondsElapsed % 60;
    document.getElementById('timer-val').textContent = m > 0 ? `${m}м ${s}с` : `${s} сек.`;
  }, 1000);
}

async function setBreak() {
  if (!isSessionActive) return alert('Сначала запустите сессию!');
  updateStatus('Перерыв');
}

// --- Загрузка списков ---
async function loadUsers() {
  const { data } = await client.from('profiles').select('*');
  const list = document.getElementById('users-list');
  list.innerHTML = '';

  if (!data) return;

  data.forEach(user => {
    const li = document.createElement('li');
    
    let dotClass = 'status-dot';
    if (user.status === 'Работает') dotClass += ' active';
    if (user.status === 'Перерыв') dotClass += ' break';

    li.innerHTML = `
      <div class="user-info">
        <div class="${dotClass}"></div>
        <span>${user.username}</span>
      </div>
      <div class="user-meta">
        <div class="location">🏠 ${user.location || 'Дома'}</div>
        <div style="color: #2563eb; font-size:11px;">${user.status}</div>
      </div>
    `;
    list.appendChild(li);
  });
}

// --- Логика Чата ---
async function loadMessages() {
  const { data } = await client.from('messages').select('*').order('id', { ascending: true }).limit(50);
  const box = document.getElementById('chat-box');
  box.innerHTML = '';
  if (data) {
    data.forEach(msg => {
      box.innerHTML += `<div class="chat-msg"><strong>${msg.username}:</strong> ${msg.text}</div>`;
    });
    box.scrollTop = box.scrollHeight;
  }
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !currentUser) return;

  const name = myProfile ? myProfile.username : currentUser.email;

  await client.from('messages').insert([{ user_id: currentUser.id, username: name, text: text }]);
  input.value = '';
}

function handleKeyPress(e) {
  if (e.key === 'Enter') sendMessage();
}

// --- Подписки на Realtime обновления (Ваши сохранены + добавлен чат) ---
client.channel('public_changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => loadUsers())
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMessages())
  .subscribe();

// Запуск приложения
checkUser();
</script>

</body>
</html>
