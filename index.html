<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Private Chat</title>

<style>
body {
    font-family: Arial;
    background: #f4f7f6;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 400px;
    background: white;
    padding: 15px;
    border-radius: 10px;
}

.users button {
    margin: 5px;
    padding: 5px 10px;
}

.chat {
    height: 300px;
    overflow-y: auto;
    border: 1px solid #ddd;
    margin: 10px 0;
    padding: 10px;
}

.msg {
    margin: 5px 0;
}

.me {
    text-align: right;
    color: blue;
}
</style>
</head>

<body>

<div class="container">

<h3>Выбери пользователя</h3>

<div class="users">
    <button onclick="selectUser('Азамат')">Азамат</button>
    <button onclick="selectUser('Максим')">Максим</button>
</div>

<h4 id="chatWith"></h4>

<div class="chat" id="chat"></div>

<input id="message" placeholder="Сообщение">
<button onclick="sendMessage()">Отправить</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "test-da803.firebaseapp.com",
  projectId: "test-da803",
  storageBucket: "test-da803.firebasestorage.app",
  messagingSenderId: "501020279316",
  appId: "1:501020279316:web:7acd5a849fcd0df318dd01",
  measurementId: "G-XYN6569D33"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👤 текущий пользователь (можешь менять)
const currentUser = "Максим";

let currentChat = null;

// 📌 выбор пользователя
window.selectUser = (user) => {
    currentChat = [currentUser, user].sort().join("_");
    document.getElementById("chatWith").innerText = "Чат с: " + user;

    loadMessages();
};

// 📤 отправка
window.sendMessage = async () => {
    const text = document.getElementById("message").value;

    if (!text || !currentChat) return;

    await addDoc(collection(db, "messages"), {
        chatId: currentChat,
        sender: currentUser,
        text: text,
        time: new Date()
    });

    document.getElementById("message").value = "";
};

// 📥 загрузка
function loadMessages() {

    const q = query(collection(db, "messages"), orderBy("time"));

    onSnapshot(q, (snap) => {

        const chat = document.getElementById("chat");
        chat.innerHTML = "";

        snap.forEach(doc => {

            const data = doc.data();

            if (data.chatId !== currentChat) return;

            const div = document.createElement("div");
            div.className = "msg";

            if (data.sender === currentUser) {
                div.classList.add("me");
            }

            div.innerText = data.sender + ": " + data.text;

            chat.appendChild(div);
        });

        chat.scrollTop = chat.scrollHeight;
    });
}

</script>

</body>
</html>
