<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Messenger & Posts</title>
    <style>
        :root { --bg: #f0f2f5; --sidebar: #ffffff; --primary: #0084ff; --text: #1c1e21; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        .container { display: flex; width: 100%; height: 100%; }
        
        .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #eee; text-align: center; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #f9f9f9; display: flex; align-items: center; }
        .user-item:hover { background: #f0f2f5; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; background: #ccc; }
        .online { background: #42b72a; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #fff; border-right: 1px solid #ddd; }
        .chat-header { padding: 15px; background: #fff; border-bottom: 1px solid #eee; font-weight: bold; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f0f2f5; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 14px; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #fff; color: var(--text); border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        .input-box { padding: 15px; display: flex; gap: 10px; background: #fff; border-top: 1px solid #eee; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { padding: 8px 20px; background: var(--primary); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; }

        .posts-area { width: 350px; display: flex; flex-direction: column; background: #f0f2f5; }
        .posts-header { padding: 15px; font-weight: bold; background: #fff; border-bottom: 1px solid #ddd; }
        .posts-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .post-card { background: #fff; padding: 12px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .post-author { font-weight: bold; font-size: 12px; color: var(--primary); margin-bottom: 4px; display: block; }
        
        .login-overlay { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <!-- ID кнопки добавлен для надежности -->
    <button id="googleBtn" style="padding: 20px 40px; font-size: 18px;">Войти через Google</button>
</div>

<div class="container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3 id="myName">Загрузка...</h3>
            <button onclick="window.logout()" style="background: #eee; color: #000; font-size: 11px;">Выйти</button>
        </div>
        <div class="user-list" id="usersList"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chatTitle">Выберите контакт</div>
        <div class="messages" id="messagesBox"></div>
        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Сообщение...">
            <button onclick="window.sendMessage()">📨</button>
        </div>
    </div>

    <div class="posts-area">
        <div class="posts-header">Лента</div>
        <div class="input-box">
            <input type="text" id="postInput" placeholder="Что нового?">
            <button onclick="window.createPost()">📡</button>
        </div>
        <div class="posts-list" id="postsBox"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://gstatic.com";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://gstatic.com";
import { getFirestore, collection, addDoc, setDoc, doc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://gstatic.com";

const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "://firebaseapp.com",
  projectId: "test-da803",
  storageBucket: "test-da803.firebasestorage.app",
  messagingSenderId: "501020279316",
  appId: "1:501020279316:web:7acd5a849fcd0df318dd01"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentChatId = null;
let unsubMessages = null;

// ПРИВЯЗКА КНОПКИ ВХОДА ЧЕРЕЗ ADDEVENTLISTENER (самый надежный способ)
document.getElementById('googleBtn').addEventListener('click', async () => {
    const provider = new GoogleAuthProvider();
    try {
        await signInWithPopup(auth, provider);
    } catch (e) {
        console.error("Ошибка входа:", e);
        alert("Ошибка! Проверь настройки домена в Firebase: " + e.code);
    }
});

window.logout = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
    const overlay = document.getElementById("loginOverlay");
    if (user) {
        currentUser = user;
        overlay.style.display = "none";
        document.getElementById("myName").innerText = user.displayName;
        
        await setDoc(doc(db, "users", user.uid), {
            name: user.displayName,
            online: true,
            lastSeen: serverTimestamp()
        }, { merge: true });

        loadUsers();
        loadPosts();
    } else {
        overlay.style.display = "flex";
    }
});

// Функции для работы с данными
window.sendMessage = async () => {
    const input = document.getElementById("msgInput");
    const val = input.value.trim();
    if (!val || !currentChatId) return;
    await addDoc(collection(db, "messages"), {
        chatId: currentChatId,
        senderId: currentUser.uid,
        text: val,
        createdAt: serverTimestamp()
    });
    input.value = "";
};

window.createPost = async () => {
    const input = document.getElementById("postInput");
    const val = input.value.trim();
    if (!val) return;
    await addDoc(collection(db, "posts"), {
        author: currentUser.displayName,
        text: val,
        createdAt: serverTimestamp()
    });
    input.value = "";
};

function loadUsers() {
    onSnapshot(collection(db, "users"), (snap) => {
        const list = document.getElementById("usersList");
        list.innerHTML = "";
        snap.forEach(uDoc => {
            if (uDoc.id === currentUser.uid) return;
            const data = uDoc.data();
            const div = document.createElement("div");
            div.className = "user-item";
            div.innerHTML = `<span class="status-dot ${data.online ? 'online' : ''}"></span> ${data.name}`;
            div.onclick = () => openChat(uDoc.id, data.name);
            list.appendChild(div);
        });
    });
}

function openChat(otherUid, name) {
    currentChatId = [currentUser.uid, otherUid].sort().join("_");
    document.getElementById("chatTitle").innerText = "Чат с " + name;
    if (unsubMessages) unsubMessages();
    const q = query(collection(db, "messages"), where("chatId", "==", currentChatId), orderBy("createdAt", "asc"));
    unsubMessages = onSnapshot(q, (snap) => {
        const box = document.getElementById("messagesBox");
        box.innerHTML = "";
        snap.forEach(m => {
            const d = m.data();
            const div = document.createElement("div");
            div.className = `msg ${d.senderId === currentUser.uid ? 'me' : 'other'}`;
            div.innerText = d.text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

function loadPosts() {
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snap) => {
        const box = document.getElementById("postsBox");
        box.innerHTML = "";
        snap.forEach(p => {
            const d = p.data();
            const div = document.createElement("div");
            div.className = "post-card";
            div.innerHTML = `<span class="post-author">${d.author}</span><div>${d.text}</div>`;
            box.appendChild(div);
        });
    });
}
</script>
</body>
</html>
