<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Messenger App</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    background: #e9ebee;
}

/* SIDEBAR */
.sidebar {
    width: 280px;
    background: #2f3640;
    color: white;
    display: flex;
    flex-direction: column;
}

.sidebar-header {
    padding: 15px;
    font-weight: bold;
    border-bottom: 1px solid #444;
    text-align: center;
}

.login-btn {
    background: #4285f4;
    color: white;
    border: none;
    padding: 8px;
    cursor: pointer;
    width: 90%;
    margin: 10px auto;
    font-size: 14px;
}

.user {
    padding: 10px;
    border-bottom: 1px solid #444;
    cursor: pointer;
}

.user:hover {
    background: #3b3b3b;
}

.status {
    font-size: 11px;
    color: #ccc;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-header {
    padding: 15px;
    background: #fff;
    border-bottom: 1px solid #ccc;
    font-weight: bold;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #f5f5f5;
}

.msg {
    padding: 10px;
    border-radius: 10px;
    margin: 5px 0;
    max-width: 60%;
}

.me {
    background: #4a90e2;
    color: white;
    margin-left: auto;
}

.other {
    background: #fff;
    border: 1px solid #ddd;
}

.inputBox {
    display: flex;
    border-top: 1px solid #ccc;
    background: #fff;
}

.inputBox input {
    flex: 1;
    padding: 12px;
    border: none;
    font-size: 14px;
}

.inputBox button {
    padding: 12px 18px;
    border: none;
    background: #4a90e2;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">Пользователи</div>
    <button class="login-btn" onclick="googleLogin()">Войти через Google</button>
    <div id="users"></div>
</div>

<div class="main">
    <div class="chat-header" id="chatTitle">Выберите чат</div>
    <div class="messages" id="messages"></div>
    <div class="inputBox">
        <input id="msgInput" placeholder="Введите сообщение...">
        <button onclick="sendMessage()">Отправить</button>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
    getFirestore,
    collection,
    query,
    where,
    onSnapshot,
    addDoc,
    doc,
    setDoc,
    serverTimestamp,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔥 Вставь свой Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "test-da803.firebaseapp.com",
  projectId: "test-da803",
  storageBucket: "test-da803.firebasestorage.app",
  messagingSenderId: "501020279316",
  appId: "1:501020279316:web:7acd5a849fcd0df318dd01",
  measurementId: "G-XYN6569D33"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentChatId = null;

// 📌 Вход через Google
window.googleLogin = async () => {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
};

// 👤 Отслеживание входа
onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    currentUser = {
        uid: user.uid,
        name: user.displayName,
        email: user.email,
        photo: user.photoURL
    };

    await setDoc(doc(db, "users", currentUser.uid), {
        name: currentUser.name,
        online: true,
        lastSeen: serverTimestamp()
    }, { merge: true });

    loadUsers();
});

// 📋 Список пользователей
function loadUsers() {
    const q = query(collection(db, "users"));
    onSnapshot(q, (snap) => {
        const container = document.getElementById("users");
        container.innerHTML = "";
        snap.forEach(u => {
            const data = u.data();
            const id = u.id;

            if (!currentUser || id === currentUser.uid) return;

            const div = document.createElement("div");
            div.className = "user";
            div.innerHTML = `
                ${data.name}
                <div class="status">${data.online ? "🟢 online" : "🔴 offline"}</div>
            `;
            div.onclick = () => openChat(id, data.name);
            container.appendChild(div);
        });
    });
}

// 🗨️ Открыть чат
function openChat(otherUid, otherName) {
    currentChatId = [currentUser.uid, otherUid].sort().join("_");
    document.getElementById("chatTitle").innerText = otherName;
    loadMessages();
}

// ✉️ Отправка сообщения
window.sendMessage = async () => {
    const text = document.getElementById("msgInput").value.trim();
    if (!text || !currentChatId) return;

    await addDoc(collection(db, "messages"), {
        chatId: currentChatId,
        sender: currentUser.uid,
        text,
        createdAt: serverTimestamp()
    });

    document.getElementById("msgInput").value = "";
};

// 📨 Загрузка сообщений
function loadMessages() {
    const q = query(
        collection(db, "messages"),
        where("chatId", "==", currentChatId),
        orderBy("createdAt")
    );

    onSnapshot(q, (snap) => {
        const box = document.getElementById("messages");
        box.innerHTML = "";
        snap.forEach(m => {
            const data = m.data();
            const msgDiv = document.createElement("div");
            msgDiv.className = "msg " + (data.sender === currentUser.uid ? "me" : "other");
            msgDiv.innerText = data.text;
            box.appendChild(msgDiv);
        });
        box.scrollTop = box.scrollHeight;
    });
}

// 🟡 Обновление статуса при закрытии
window.addEventListener("beforeunload", async () => {
    if (!currentUser) return;
    await setDoc(doc(db, "users", currentUser.uid), {
        online: false,
        lastSeen: serverTimestamp()
    }, { merge: true });
});

</script>
</body>
</html>
