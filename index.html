<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Firebase Cloud Project</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f9; }
        .form-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        h3 { margin-top: 0; color: #333; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #64b5f6; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #42a5f5; }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
        <input type="text" id="userName" placeholder="Ваше имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <button type="submit">Отправить в облако</button>
    </form>
</div>

<script type="module">
    // 1. ИСПРАВЛЕНО: Полные пути к модулям Firebase
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, addDoc } from "https://gstatic.com";

    // 2. ИСПРАВЛЕНО: Восстановлен правильный authDomain
    const firebaseConfig = {
        apiKey: "AIzaSyD6j7BH_Dy5v6DEgua7nM13DNmiE3SBuYQ",
        authDomain: "enter-45f17.firebaseapp.com",
        projectId: "enter-45f17",
        storageBucket: "enter-45f17.firebasestorage.app",
        messagingSenderId: "672982908171",
        appId: "1:672982908171:web:c216fe2b8087e51f7f426e"
    };

    // 3. Инициализация
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 4. Логика формы
    document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const nameInput = document.getElementById("userName").value;
        const emailInput = document.getElementById("userEmail").value;

        try {
            await addDoc(collection(db, "requests"), {
                name: nameInput,
                email: emailInput,
                timestamp: new Date()
            });

            alert("Готово! Данные сохранены в Firebase.");
            document.getElementById("feedbackForm").reset();
        } catch (error) {
            // Если ошибка в консоли пишет "Missing or insufficient permissions", 
            // значит нужно поменять Rules в консоли Firebase на allow write: if true;
            console.error("Ошибка записи: ", error);
            alert("Ошибка! Проверьте правила доступа в консоли Firebase.");
        }
    });
</script>

</body>
</html>
