<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Firebase Form</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f9; }
        .form-container { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0084ff; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: #0073e6; }
    </style>
</head>
<body>

<div class="form-container">
    <form id="contact-form">
        <input type="text" id="username" placeholder="Your Name" required>
        <input type="email" id="useremail" placeholder="Your Email" required>
        <button type="submit">Submit & Request</button>
    </form>
</div>

<script type="module">
    // Фикс: указаны полные ссылки на актуальную версию SDK
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, addDoc } from "https://gstatic.com";

    // Ваша конфигурация
    const firebaseConfig = {
        apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
        authDomain: "://firebaseapp.com",
        projectId: "test-da803",
        storageBucket: "test-da803.firebasestorage.app",
        messagingSenderId: "501020279316",
        appId: "1:501020279316:web:7acd5a849fcd0df318dd01",
        measurementId: "G-XYN6569D33"
    };

    // Инициализация
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Обработчик формы
    document.getElementById("contact-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const userName = document.getElementById("username").value;
        const userEmail = document.getElementById("useremail").value;

        try {
            // Фикс: добавлен await для асинхронной отправки
            await addDoc(collection(db, "requests"), {
                name: userName,
                email: userEmail,
                timestamp: new Date()
            });
            
            alert("Заявка успешно отправлена!");
            document.getElementById("contact-form").reset();
        } catch (error) {
            console.error("Ошибка при отправке:", error);
            alert("Ошибка! Проверьте консоль браузера (F12). Возможно, закрыты правила доступа в Firebase.");
        }
    });
</script>

</body>
</html>
