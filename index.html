<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cloud Feed</title>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f7f6;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 500px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid #ddd;
    border-radius: 6px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

#mainBtn {
    background: #007bff;
    color: white;
    width: 100%;
}

.post {
    background: white;
    border: 1px solid #eee;
    padding: 15px;
    margin-top: 10px;
    border-radius: 8px;
}

.like-btn {
    background: #f1f1f1;
}
.time {
    font-size: 12px;
    color: gray;
    float: right;
}
</style>
</head>

<body>

<div class="container">
    <h3>Панель</h3>

    <input id="name" placeholder="Имя">
    <input id="email" placeholder="Email">

    <button id="mainBtn">Опубликовать</button>
</div>

<input id="search" placeholder="🔍 Поиск..." style="margin-top:10px; max-width:500px; width:100%; padding:10px;">

<div id="feed" style="max-width:500px; width:100%;"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot,
    doc,
    updateDoc,
    deleteDoc,
    increment,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";


// 🔥 ТВОЙ FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPosts = [];

// ✅ ВАЛИДАЦИЯ
function validate(name, email) {
    if (name.length < 2) return alert("Имя короткое");
    if (!email.includes("@")) return alert("Email неверный");
    return true;
}

// ✅ ДОБАВИТЬ
document.getElementById("mainBtn").onclick = async () => {

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();

    if (!validate(name, email)) return;

    await addDoc(collection(db, "posts"), {
        name,
        email,
        likes: 0,
        createdAt: serverTimestamp()
    });

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
};

// ✅ УДАЛИТЬ
window.deletePost = async (id) => {
    await deleteDoc(doc(db, "posts", id));
};

// ✅ ЛАЙК
window.likePost = async (id) => {
    await updateDoc(doc(db, "posts", id), {
        likes: increment(1)
    });
};

// ✅ РЕДАКТИРОВАТЬ
window.editPost = async (id, oldName) => {
    const newName = prompt("Новое имя:", oldName);
    if (!newName) return;

    await updateDoc(doc(db, "posts", id), {
        name: newName
    });
};

// ✅ РЕНДЕР
function render(posts) {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    posts.forEach(p => {
        let time = "...";

        if (p.createdAt?.toDate) {
            time = p.createdAt.toDate().toLocaleString();
        }

        feed.innerHTML += `
        <div class="post">
            <span class="time">${time}</span>
            <b>${p.name}</b>
            <p>${p.email}</p>

            <button class="like-btn" onclick="likePost('${p.id}')">
                👍 ${p.likes || 0}
            </button>

            <button onclick="editPost('${p.id}', '${p.name}')">✏️</button>
            <button onclick="deletePost('${p.id}')">🗑</button>
        </div>
        `;
    });
}

// ✅ REALTIME
const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

onSnapshot(q, (snap) => {
    allPosts = [];

    snap.forEach(docItem => {
        allPosts.push({
            id: docItem.id,
            ...docItem.data()
        });
    });

    render(allPosts);
});

// ✅ ПОИСК
document.getElementById("search").addEventListener("input", (e) => {

    const val = e.target.value.toLowerCase();

    if (!val) return render(allPosts);

    const filtered = allPosts.filter(p =>
        p.name.toLowerCase().includes(val)
    );

    render(filtered);
});

</script>
</body>
</html>
