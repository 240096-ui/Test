<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YusufCHAT — Premium Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #007bff;
  --primary-hover: #0056b3;
  --bg: #f4f7f9;
  --card: #ffffff;
  --text-main: #1a1d21;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --radius: 20px;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  margin: 0;
}

/* HEADER */
.top-nav {
  width: 100%;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  padding: 12px 0;
  display: flex;
  justify-content: center;
  border-bottom: 1px solid var(--border);
}

.nav-content {
  width: 100%;
  max-width: 1200px;
  display: flex;
  justify-content: space-between;
  padding: 0 24px;
}

.logo {
  font-weight: 800;
  font-size: 22px;
  color: var(--primary);
}

/* GRID */
.main-layout {
  display: grid;
  grid-template-columns: 300px 1fr 340px;
  gap: 24px;
  max-width: 1200px;
  margin: auto;
  padding: 24px;
}

.container {
  background: #fff;
  padding: 20px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

/* USERS */
.user-item {
  display: flex;
  gap: 10px;
  padding: 10px;
  cursor: pointer;
}

.user-item:hover {
  background: #f5f5f5;
}

/* POSTS */
.post {
  background: #fff;
  padding: 15px;
  border-radius: 20px;
  margin-bottom: 15px;
}

/* CHAT */
#chatMessages {
  height: 300px;
  overflow: auto;
}

.msg {
  padding: 8px;
  margin: 5px 0;
  border-radius: 10px;
}

.msg-me {
  background: #007bff;
  color: white;
  margin-left: auto;
}

.msg-them {
  background: #eee;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="top-nav">
  <div class="nav-content">
    <div class="logo">CloudApp</div>
    <button id="loginBtn">Войти</button>
  </div>
</div>

<div class="main-layout">

  <!-- LEFT -->
  <div class="container">
    <h3>Собеседники</h3>
    <div id="userList"></div>
  </div>

  <!-- CENTER -->
  <div>
    <div class="container">
      <input id="contentInput" placeholder="Что нового?">
      <button id="mainBtn">Опубликовать</button>
    </div>

    <div id="feed"></div>
  </div>

  <!-- RIGHT -->
  <div class="container">
    <div id="chatMessages"></div>

    <input id="chatInput">
    <button id="sendChatBtn">Отправить</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "test-da803.firebaseapp.com",
  projectId: "test-da803",
  storageBucket: "test-da803.firebasestorage.app",
  messagingSenderId: "501020279316",
  appId: "1:501020279316:web:7acd5a849fcd0df318dd01",
  measurementId: "G-XYN6569D33"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

document.getElementById("loginBtn").onclick = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

</script>

</body>
</html>
