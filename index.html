<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REALTIME MONITOR | Статусы группы</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-main: #0a0b10;
  --bg-card: #12131a;
  --bg-input: #1a1b26;
  --accent-blue: #00f2fe;
  --accent-purple: #9b51e0;
  --text-main: #ffffff;
  --text-muted: #707593;
  --status-online: #22c55e;
  --status-break: #fbc02d;
  --status-busy: #ef4444;
  --status-offline: #4b5563;
}

body {
  margin: 0; padding: 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg-main); color: var(--text-main);
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; box-sizing: border-box;
}

.brand-header { width: 100%; max-width: 380px; text-align: left; margin-bottom: 10px; }
.brand-title { font-size: 11px; font-weight: 800; color: #414665; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
.brand-subtitle { font-size: 24px; font-weight: 800; margin: 4px 0 15px 0; }
.brand-subtitle span { color: var(--accent-purple); }

.card {
  width: 100%; max-width: 380px; background: var(--bg-card); padding: 20px; border-radius: 20px;
  margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.3); box-sizing: border-box;
  border: 1px solid rgba(255,255,255,0.03);
}

.auth-card { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 20px 0; }
.user-header-block { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.avatar-placeholder {
  width: 44px; height: 44px; background: var(--accent-purple); border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px;
}
.user-info-text { display: flex; flex-direction: column; }
.user-name { font-size: 16px; font-weight: 700; color: var(--text-main); }
.user-status-tag { font-size: 12px; color: var(--status-online); display: flex; align-items: center; gap: 4px; margin-top: 2px; }

.timer-block { font-size: 32px; font-weight: 800; color: var(--accent-blue); margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
.timer-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }

.btn {
  width: 100%; border: none; padding: 14px; border-radius: 12px; cursor: pointer;
  color: white; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 10px;
}
.btn-start { background: #ef4444; }
.btn-start.inactive { background: var(--status-online); }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
.btn-break { background: #242533; color: var(--text-main); border: 1px solid rgba(255,255,255,0.05); }
.btn-logout { background: #1a1b26; color: var(--text-muted); }
.btn-google { background: #4285F4; font-size: 15px; padding: 16px; }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; text-align: center; }
.stat-box { background: rgba(255,255,255,0.02); padding: 10px 4px; border-radius: 10px; }
.stat-val { font-size: 14px; font-weight: 700; color: var(--accent-blue); }
.stat-val.purple { color: var(--accent-purple); }
.stat-val.green { color: var(--status-online); }
.stat-val.red { color: var(--status-busy); }
.stat-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-top: 4px; }

.status-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.status-pill {
  background: #1a1b26; border: 1px solid rgba(255,255,255,0.05); padding: 12px; 
  border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600;
}
.status-pill.active { border-color: var(--accent-purple); background: rgba(155, 81, 224, 0.1); }

.tabs-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: #1a1b26; padding: 4px; border-radius: 10px; margin-bottom: 15px; }
.tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 8px; font-size: 11px; font-weight: 700; cursor: pointer; border-radius: 7px; text-align: center; }
.tab-btn.active { background: #242533; color: white; }

.section-title { font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 15px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

.user-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.user-left { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--status-offline); box-shadow: 0 0 8px var(--status-offline); }
.dot.online { background: var(--status-online); box-shadow: 0 0 8px var(--status-online); }
.dot.break { background: var(--status-break); box-shadow: 0 0 8px var(--status-break); }
.dot.busy { background: var(--status-busy); box-shadow: 0 0 8px var(--status-busy); }
.user-right { text-align: right; }
.loc-text { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; justify-content: flex-end; gap: 4px; }
.time-text { font-size: 10px; color: var(--accent-blue); margin-top: 2px; font-weight: bold; }

/* Дизайн блока ачивок */
.achievements-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ach-card { background: #1a1b26; border: 1px solid rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; opacity: 0.4; transition: all 0.3s; }
.ach-card.unlocked { opacity: 1; border-color: var(--accent-purple); background: rgba(155, 81, 224, 0.05); }
.ach-icon { font-size: 20px; margin-bottom: 6px; }
.ach-title { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.ach-desc { font-size: 10px; color: var(--text-muted); }
.ach-status { font-size: 8px; font-weight: bold; text-transform: uppercase; display: inline-block; padding: 2px 6px; border-radius: 4px; margin-top: 6px; background: #242533; color: var(--text-muted); }
.ach-card.unlocked .ach-status { background: var(--accent-purple); color: white; }

.chat-window { background: #1a1b26; border: 1px solid rgba(255,255,255,0.02); border-radius: 14px; height: 180px; overflow-y: auto; padding: 12px; margin-bottom: 12px; }
.msg { font-size: 13px; margin-bottom: 8px; color: #b4b7c9; line-height: 1.4; }
.msg strong { color: #fff; font-weight: 600; }
.input-container { display: flex; gap: 8px; }
.input-field { flex: 1; border: 1px solid rgba(255,255,255,0.05); padding: 12px 14px; border-radius: 12px; outline: none; background: #1a1b26; color: white; font-size: 13px; }
.btn-send { background: var(--accent-purple); border: none; width: 44px; height: 44px; border-radius: 12px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="brand-header">
  <div class="brand-title">Realtime Monitor</div>
  <div class="brand-subtitle">Статусы <span>группы</span></div>
</div>

<div class="card">
  <div id="logged-out-view" class="auth-card">
    <div class="user-name" style="margin-bottom: 20px;">Войдите в систему для начала учёбы</div>
    <button class="btn btn-google" onclick="login()">🔑 Войти через Google</button>
  </div>
  
  <div id="logged-in-view" style="display: none;">
    <div class="user-header-block">
      <div class="avatar-placeholder" id="avatar-letter">U</div>
      <div class="user-info-text">
        <div class="user-name" id="user-fullname">Загрузка...</div>
        <div class="user-status-tag" id="status-tag"><div class="dot online"></div> В сети</div>
      </div>
    </div>
    
    <div class="timer-label">Сессия учёбы</div>
    <div class="timer-block">⏱️ <span id="timer-display">0с</span></div>
    
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val" id="stat-session-time">0с</div><div class="stat-lbl">сессия</div></div>
      <div class="stat-box"><div class="stat-val purple" id="stat-total-time">0с</div><div class="stat-lbl">всего</div></div>
      <div class="stat-box"><div class="stat-val green" id="stat-messages-count">0</div><div class="stat-lbl">сообщ.</div></div>
      <div class="stat-box"><div class="stat-val red" id="stat-ach-count">0/4</div><div class="stat-lbl">достиж.</div></div>
    </div>
    
    <div class="status-selector">
      <div class="status-pill active" id="status-pill-online" onclick="changeStatus('Работает')"><div class="dot online"></div> В сети</div>
      <div class="status-pill" id="status-pill-break" onclick="changeStatus('Перерыв')"><div class="dot break"></div> Отошёл</div>
      <div class="status-pill" id="status-pill-busy" onclick="changeStatus('Занят')"><div class="dot busy"></div> Занят</div>
      <div class="status-pill" id="status-pill-offline" onclick="changeStatus('Не в сети')"><div class="dot"></div> Офлайн</div>
    </div>
    
    <button id="main-action-btn" class="btn btn-start" onclick="handleSessionToggle()">⛔ Завершить</button>
    <div class="btn-row">
      <button class="btn btn-break" onclick="changeStatus('Перерыв')">☕ Перерыв</button>
      <button class="btn btn-logout" onclick="logout()">Выход</button>
    </div>
  </div>
</div>

<!-- ДИНАМИЧЕСКИЙ БЛОК ВКЛАДОК -->
<div class="card">
  <div class="tabs-row">
    <button class="tab-btn active" id="tab-users" onclick="switchTab('users')">👥 Участники</button>
    <button class="tab-btn" id="tab-rating" onclick="switchTab('rating')">🏆 Рейтинг</button>
    <button class="tab-btn" id="tab-achievements" onclick="switchTab('achievements')">🏅 Достижения</button>
  </div>
  
  <div id="tab-content-users">
    <div class="section-title">Все участники (<span id="total-users-count">0</span>)</div>
    <div id="group-list"></div>
  </div>
  
  <div id="tab-content-rating" style="display: none;">
    <div class="section-title">🏆 Топ студентов по учёбе</div>
    <div id="rating-list"></div>
  </div>
  
  <div id="tab-content-achievements" style="display: none;">
    <div class="section-title">Все достижения</div>
    <div class="achievements-list" id="achievements-box"></div>
  </div>
</div>

<div class="card">
  <div class="section-title">💬 Общий чат</div>
  <div class="chat-window" id="chat-messages"></div>
  <div class="input-container">
    <input type="text" id="message-input" class="input-field" placeholder="Сообщение..." onkeypress="checkEnter(event)">
    <button class="btn-send" onclick="sendChat()">➔</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lyjdlgxhocscvwbcwrtc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5amRsZ3hob2NzY3Z3YmN3cnRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODQzMTEsImV4cCI6MjA5MjI2MDMxMX0.X0ua0z3bDdOzxR6gCTMhRa8La5RhDuKzMMBlH60_1R0';

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let userObj = null, profileObj = null, sessionSeconds = 0, totalSeconds = 0, timer = null, working = true, currentTab = 'users';

async function authStateInit() {
  if (window.location.hash.includes('access_token=')) await new Promise(r => setTimeout(r, 500));
  const { data: { session } } = await client.auth.getSession();

  if (session && session.user) {
    userObj = session.user;
    document.getElementById('logged-out-view').style.display = 'none';
    document.getElementById('logged-in-view').style.display = 'block';
    document.getElementById('avatar-letter').textContent = userObj.email.charAt(0).toUpperCase();
    
    if (window.location.hash.includes('access_token=')) {
      window.history.replaceState({}, document.title, window.location.href.split('#')[0]);
    }
    await fetchProfile();
  } else {
    document.getElementById('logged-out-view').style.display = 'flex';
    document.getElementById('logged-in-view').style.display = 'none';
    refreshData();
  }
}

async function login() {
  await client.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: 'https://240096-ui.github.io/Test/', flowType: 'implicit' } });
}

async function logout() {
  clearInterval(timer);
  await saveTimeToDB();
  if(userObj) await client.from('profiles').update({ status: 'Не в сети' }).eq('id', userObj.id);
  await client.auth.signOut();
  window.location.reload();
}

async function fetchProfile() {
  const { data: profiles } = await client.from('profiles').select('*').eq('id', userObj.id);
  let cp = profiles && profiles.length > 0 ? profiles[0] : null;
  
  if (!cp) {
    const { data: newProfiles } = await client.from('profiles').insert([{ id: userObj.id, username: userObj.email.split('@')[0], status: 'Работает', location: 'Дома', total_seconds: 0, message_count: 0 }]).select();
    if (newProfiles) cp = newProfiles[0];
  }

  if (cp) {
    profileObj = cp;
    totalSeconds = cp.total_seconds || 0;
    document.getElementById('user-fullname').textContent = cp.username || userObj.email;
    updateStatusUI(cp.status);
    updateStatsGrid();
    if (cp.status === 'Работает' || cp.status === 'Онлайн') runTimer();
  }
  refreshData();
}

function runTimer() {
  clearInterval(timer);
  timer = setInterval(async () => {
    sessionSeconds++;
    totalSeconds++;
    updateStatsGrid();
    
    // Синхронизируем время с базой каждые 10 секунд
    if (sessionSeconds % 10 === 0) {
      await saveTimeToDB();
    }
  }, 1000);
}

async function saveTimeToDB() {
  if (!userObj) return;
  await client.from('profiles').update({ total_seconds: totalSeconds }).eq('id', userObj.id);
}

function formatTime(sec) {
  if(sec < 60) return `${sec}с`;
  let m = Math.floor(sec / 60), s = sec % 60;
  if(m < 60) return `${m}м ${s}с`;
  let h = Math.floor(m / 60); m = m % 60;
  return `${h}ч ${m}м ${s}с`;
}

function updateStatsGrid() {
  document.getElementById('timer-display').textContent = formatTime(sessionSeconds);
  document.getElementById('stat-session-time').textContent = formatTime(sessionSeconds);
  document.getElementById('stat-total-time').textContent = formatTime(totalSeconds);
  
  const msgCount = profileObj ? profileObj.message_count || 0 : 0;
  document.getElementById('stat-messages-count').textContent = msgCount;
  
  // Считаем открытые ачивки
  let unlocked = 0;
  if (totalSeconds > 0) unlocked++;
  if (totalSeconds >= 60) unlocked++;
  if (msgCount >= 5) unlocked++;
  if (msgCount >= 20) unlocked++;
  document.getElementById('stat-ach-count').textContent = `${unlocked}/4`;
  
  if (currentTab === 'achievements') renderAchievements(unlocked, msgCount);
}

async function changeStatus(newStatus) {
  if (!userObj) return;
  updateStatusUI(newStatus);
  
  if (newStatus === 'Работает' || newStatus === 'Онлайн') {
    working = true;
    runTimer();
  } else {
    clearInterval(timer);
    await saveTimeToDB();
    if (newStatus === 'Не в сети') {
      sessionSeconds = 0;
      document.getElementById('timer-display').textContent = "0с";
    }
  }
  await client.from('profiles').update({ status: newStatus }).eq('id', userObj.id);
}

function updateStatusUI(status) {
  document.querySelectorAll('.status-pill').forEach(el => el.classList.remove('active'));
  const tag = document.getElementById('status-tag');
  if (status === 'Работает' || status === 'Онлайн') {
    document.getElementById('status-pill-online').classList.add('active');
    tag.innerHTML = `<div class="dot online"></div> В сети`;
    tag.style.color = 'var(--status-online)';
  } else if (status === 'Перерыв') {
    document.getElementById('status-pill-break').classList.add('active');
    tag.innerHTML = `<div class="dot break"></div> Отошёл`;
    tag.style.color = 'var(--status-break)';
  } else if (status === 'Занят') {
    document.getElementById('status-pill-busy').classList.add('active');
    tag.innerHTML = `<div class="dot busy"></div> Занят`;
    tag.style.color = 'var(--status-busy)';
  } else {
    document.getElementById('status-pill-offline').classList.add('active');
    tag.innerHTML = `<div class="dot"></div> Офлайн`;
    tag.style.color = 'var(--text-muted)';
  }
}

async function handleSessionToggle() {
  const b = document.getElementById('main-action-btn');
  if (working) {
    working = false; b.textContent = "▶️ Продолжить"; b.className = "btn btn-start inactive";
    await changeStatus('Перерыв');
  } else {
    working = true; b.textContent = "⛔ Завершить"; b.className = "btn btn-start";
    await changeStatus('Работает');
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  
  document.getElementById('tab-content-users').style.display = tab === 'users' ? 'block' : 'none';
  document.getElementById('tab-content-rating').style.display = tab === 'rating' ? 'block' : 'none';
  document.getElementById('tab-content-achievements').style.display = tab === 'achievements' ? 'block' : 'none';
  
  refreshData();
}

async function refreshData() {
  const { data: users } = await client.from('profiles').select('*');
  if (!users) return;

  // 1. ВКЛАДКА УЧАСТНИКИ
  document.getElementById('total-users-count').textContent = users.length;
  const list = document.getElementById('group-list');
  list.innerHTML = '';
  users.forEach(u => {
    let stateStyle = 'dot', statusText = 'Офлайн';
    if (u.status === 'Работает' || u.status === 'Онлайн') { stateStyle += ' online'; statusText = 'В сети'; }
    if (u.status === 'Перерыв') { stateStyle += ' break'; statusText = 'Отошёл'; }
    if (u.status === 'Занят') { stateStyle += ' busy'; statusText = 'Занят'; }
    
    list.innerHTML += `
      <div class="user-item">
        <div class="user-left"><div class="${stateStyle}"></div><span>${u.username || 'Студент'}</span></div>
        <div class="user-right">
          <div class="loc-text">🏠 ${u.location || 'Дома'}</div>
          <div class="time-text">${statusText}</div>
        </div>
      </div>`;
  });

  // 2. ВКЛАДКА РЕЙТИНГ (Сортировка по времени)
  const ratingList = document.getElementById('rating-list');
  ratingList.innerHTML = '';
  const sortedUsers = [...users].sort((a,b) => (b.total_seconds || 0) - (a.total_seconds || 0));
  sortedUsers.forEach((u, index) => {
    ratingList.innerHTML += `
      <div class="user-item">
        <div class="user-left"><span>#${index + 1} ${u.username || 'Студент'}</span></div>
        <div class="user-right">
          <div class="time-text" style="font-size:13px; color:var(--accent-purple);">${formatTime(u.total_seconds || 0)}</div>
        </div>
      </div>`;
  });

  // 3. ВКЛАДКА ДОСТИЖЕНИЯ
  if (userObj) {
    const myProfile = users.find(u => u.id === userObj.id);
    if (myProfile) {
      const msgCount = myProfile.message_count || 0;
      let unlocked = 0;
      if (totalSeconds > 0) unlocked++;
      if (totalSeconds >= 60) unlocked++;
      if (msgCount >= 5) unlocked++;
      if (msgCount >= 20) unlocked++;
      renderAchievements(unlocked, msgCount);
    }
  }
}

function renderAchievements(unlocked, msgCount) {
  const box = document.getElementById('achievements-box');
  const achs = [
    { id: 1, icon: '🌱', title: 'Первый шаг', desc: 'Начать самую первую учебную сессию', cond: totalSeconds > 0 },
    { id: 2, icon: '⚡', title: 'Трудоголик', desc: 'Суммарно проучиться больше 1 минуты', cond: totalSeconds >= 60 },
    { id: 3, icon: '💬', title: 'Душа компании', desc: 'Написать 5 сообщений в общий чат', cond: msgCount >= 5 },
    { id: 4, icon: '🔥', title: 'Активист', desc: 'Написать 20 сообщений в чат', cond: msgCount >= 20 }
  ];
  
  box.innerHTML = '';
  achs.forEach(a => {
    box.innerHTML += `
      <div class="ach-card ${a.cond ? 'unlocked' : ''}">
        <div class="ach-icon">${a.icon}</div>
        <div class="ach-title">${a.title}</div>
        <div class="ach-desc">${a.desc}</div>
        <div class="ach-status">${a.cond ? 'Обычное' : 'Закрыто'}</div>
      </div>`;
  });
}

async function getMessages() {
  const { data } = await client.from('messages').select('*').order('id', { ascending: true });
  const view = document.getElementById('chat-messages');
  view.innerHTML = '';
  if (data) {
    data.forEach(m => { view.innerHTML += `<div class="msg"><strong>${m.username || 'Аноним'}:</strong> ${m.text}</div>`; });
    view.scrollTop = view.scrollHeight;
  }
}

async function sendChat() {
  const el = document.getElementById('message-input');
  const txt = el.value.trim();
  if (!txt || !userObj) return;
  const name = profileObj ? profileObj.username : userObj.email.split('@')[0];
  await client.from('messages').insert([{ user_id: userObj.id, username: name, text: txt }]);
  el.value = '';
  
  // Локально апаем счетчик сообщений для моментального рендера ачивок
  if(profileObj) {
    profileObj.message_count = (profileObj.message_count || 0) + 1;
    updateStatsGrid();
  }
}

function checkEnter(e) { if (e.key === 'Enter') sendChat(); }

client.channel('any')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => refreshData())
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => { getMessages(); refreshData(); })
  .subscribe();

authStateInit();
getMessages();
</script>
</body>
</html>
