<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudApp</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#eef1f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#fff;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

button {
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#007bff;
  color:#fff;
  cursor:pointer;
}

#user {
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>CloudApp Login</h2>
  <button id="loginBtn">Войти через Google</button>
  <div id="user"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
  authDomain: "test-da803.firebaseapp.com",
  projectId: "test-da803",
  storageBucket: "test-da803.firebasestorage.app",
  messagingSenderId: "501020279316",
  appId: "1:501020279316:web:7acd5a849fcd0df318dd01"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// КНОПКА ВХОДА
document.getElementById("loginBtn").onclick = () => {
  signInWithRedirect(auth, provider);
};

// ПОСЛЕ РЕДИРЕКТА
getRedirectResult(auth)
  .then((result) => {
    if (result?.user) {
      console.log("Успешный вход:", result.user);
    }
  })
  .catch((error) => {
    console.error("Ошибка входа:", error);
  });

// СОСТОЯНИЕ ПОЛЬЗОВАТЕЛЯ
onAuthStateChanged(auth, (user) => {
  const userDiv = document.getElementById("user");

  if (user) {
    userDiv.innerHTML = `
      Привет, ${user.displayName}<br><br>
      <button id="logoutBtn">Выйти</button>
    `;

    document.getElementById("logoutBtn").onclick = () => {
      signOut(auth);
    };

  } else {
    userDiv.innerHTML = "";
  }
});

</script>

</body>
</html>
