<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud Chat</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Шапка пользователя */
        .user-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #4caf50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }

        .logout-btn {
            color: #d93025;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }

        /* Область чата */
        .chat-messages {
            height: 400px;
            padding: 20px;
            overflow-y: auto;
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 14px;
        }

        .received { background: #f1f0f0; align-self: flex-start; }
        .sent { background: #1a73e8; color: white; align-self: flex-end; }

        /* Ввод сообщения */
        .input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 10px 15px;
            outline: none;
        }

        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }

        .google-btn {
            padding: 10px 20px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>Private Cloud Chat</h2>
    <button class="google-btn" onclick="login()">Войти через Google</button>
</div>

<div class="chat-container" id="chat-app" style="display: none;">
    <div class="user-header">
        <div class="user-info">
            <div class="avatar" id="user-avatar">?</div>
            <span id="user-name">Загрузка...</span>
        </div>
        <span class="logout-btn" onclick="logout()">Выйти</span>
    </div>

    <div class="chat-messages" id="messages">
        <div class="message received">Добрый день</div>
    </div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Ваше сообщение...">
        <button id="send-btn" style="background:none; border:none; color:#1a73e8; cursor:pointer;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z""")/>></svg>
        </button>
    </div>
</div>

<!-- SDK Firebase -->
<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://gstatic.com";
    import { getDatabase, ref, push, onChildAdded } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyBPnoCcL-TUYTdYPaJunewfsaWIylyDE7w",
        authDomain: "test-da803.firebaseapp.com",
        projectId: "test-da803",
        storageBucket: "test-da803.firebasestorage.app",
        messagingSenderId: "501020279316",
        appId: "1:501020279316:web:7acd5a849fcd0df318dd01",
        measurementId: "G-XYN6569D33"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // Авторизация
    window.login = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-app').style.display = 'flex';
            document.getElementById('user-name').innerText = user.displayName;
            document.getElementById('user-avatar').innerText = user.displayName.charAt(0);
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('chat-app').style.display = 'none';
        }
    });

    // Работа с сообщениями
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const messagesDiv = document.getElementById('messages');

    sendBtn.onclick = () => {
        const text = msgInput.value;
        if (text.trim() && auth.currentUser) {
            push(ref(db, 'messages'), {
                text: text,
                uid: auth.currentUser.uid,
                name: auth.currentUser.displayName,
                timestamp: Date.now()
            });
            msgInput.value = '';
        }
    };

    onChildAdded(ref(db, 'messages'), (data) => {
        const msg = data.val();
        const div = document.createElement('div');
        div.className = `message ${msg.uid === auth.currentUser?.uid ? 'sent' : 'received'}`;
        div.innerText = msg.text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
</script>

</body>
</html>
